<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고교 야간 자율학습 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .touch-target { min-height: 48px; min-width: 48px; }
        .status-present { background-color: #dcfce7; color: #166534; border-color: #86efac; }
        .status-absent  { background-color: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .status-none    { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        button:active { transform: scale(0.95); }
        .no-scale:active { transform: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
        /* 토스트 */
        #toast {
            position: fixed; bottom: 1rem; right: 1rem;
            padding: 0.75rem 1.5rem; border-radius: 0.75rem;
            color: #fff; font-size: 0.875rem; font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            transform: translateY(6rem); transition: transform 0.3s ease; z-index: 9999;
        }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen text-slate-900 relative">
<div id="app" class="max-w-7xl mx-auto p-4 md:p-6 pb-20">

<script type="module">

import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

// ─── 상수 ──────────────────────────────────────────────────────────────────

// ─── 앱 상태 ───────────────────────────────────────────────────────────────
let db, auth, user, unsubAttendance;

const state = {
    currentView:    'teacher',
    selectedGrade:  null,
    selectedClass:  null,
    currentDateStr: '',
    currentMonthStr:'',
    todayRealStr:   '',
    attendanceData: {},      // { docId: { studentId: { p1, p2, p3, p4 } } }
    studentsByClass:{},      // { '1_1': [...], '1_2': [...] }  ← 미리 그룹핑
    teachersData:   {}
};

// ─── 유틸리티 ──────────────────────────────────────────────────────────────

/**
 * [버그수정] 타임존 안전한 오늘 날짜 문자열 반환 (YYYY-MM-DD)
 * new Date()는 UTC 기준이라 한국(UTC+9)에서 자정 이전 호출 시 날짜가 밀림.
 * 로컬 시간 기준으로 직접 포맷한다.
 */
function getTodayLocalStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
}

/**
 * [버그수정] 날짜 문자열(YYYY-MM-DD) 덧셈 — 타임존 무관하게 동작
 * new Date("2025-05-01")은 UTC 00:00 기준이라 로컬에서 getDay()가 달라질 수 있음.
 * 'T12:00:00' 정오를 붙여 DST·타임존 경계 문제를 회피한다.
 */
function addDays(dateStr, delta) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    return d.toISOString().slice(0, 10);
}

/** YYYY-MM-DD → 'YYYY.MM.DD (요일)' */
function formatDateDisplay(dateStr) {
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const d = new Date(dateStr + 'T12:00:00');
    return `${dateStr.replace(/-/g, '.')} (${days[d.getDay()]})`;
}

/** 학년·반 → 학생 배열 (미리 그룹핑해둔 Map 사용) */
function getStudents(grade, cls) {
    return state.studentsByClass[`${grade}_${cls}`] || [];
}

/** 학생 데이터 파싱 및 학년·반 그룹핑 */
function parseStudentCSV(text) {
    const students = text.trim().split('\n').slice(1).map(line => {
        const parts = line.split(',');
        if (parts.length < 2) return null;
        const hs = parts[0].trim();
        if (hs.length !== 5) return null;
        return {
            id:    hs,
            grade: parseInt(hs[0]),
            class: parseInt(hs.substring(1, 3)),
            no:    parseInt(hs.substring(3, 5)),
            name:  parts[1].trim()
        };
    }).filter(Boolean);

    // [성능개선] 학년·반 별로 미리 그룹핑
    const grouped = {};
    students.forEach(s => {
        const key = `${s.grade}_${s.class}`;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(s);
    });
    return grouped;
}

function parseTeacherCSV(text) {
    const obj = {};
    text.trim().split('\n').slice(1).forEach(line => {
        const parts = line.split(',');
        if (parts.length < 3) return;
        const gMatch = parts[0].match(/\d+/);
        const cMatch = parts[1].match(/\d+/);
        if (gMatch && cMatch) obj[`${parseInt(gMatch[0])}_${parseInt(cMatch[0])}`] = parts[2].trim();
    });
    return obj;
}

/** 빈 출결 객체 생성 */
function emptyAttendance() {
    const o = {};
    for (let p = 1; p <= MAX_PERIOD; p++) o[`p${p}`] = 0;
    return o;
}

/** 출결 상태 0→1→2→0 순환 */
function nextStatus(cur) { return (cur + 1) % 3; }

// ─── 토스트 ────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.backgroundColor = type === 'success' ? '#1e293b' : '#991b1b';
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── 날짜 UI ───────────────────────────────────────────────────────────────
function setDateVariables(dateStr) {
    state.currentDateStr  = dateStr;
    state.currentMonthStr = dateStr.substring(0, 7);

    document.getElementById('current-date-display').textContent = formatDateDisplay(dateStr);
    document.getElementById('date-selector').value = dateStr;

    const isTodayOrFuture = dateStr >= state.todayRealStr;
    const isToday         = dateStr === state.todayRealStr;

    const btnPlus = document.getElementById('btn-day-plus');
    btnPlus.disabled = isTodayOrFuture;
    btnPlus.classList.toggle('opacity-30', isTodayOrFuture);

    document.getElementById('btn-today').classList.toggle('hidden', isToday);
    document.getElementById('date-warning').classList.toggle('hidden', isToday);
}

window.adjustDate = (delta) => {
    const next = addDays(state.currentDateStr, delta);
    if (next <= state.todayRealStr) changeDate(next);
};

window.changeDate = (newDate) => {
    if (newDate > state.todayRealStr) return; // 미래 날짜 차단
    const oldMonth = state.currentMonthStr;
    setDateVariables(newDate);
    // [버그수정] 월 변경 시 Firestore 구독 재설정, 같은 달이면 화면만 갱신
    if (oldMonth !== state.currentMonthStr && user && db) {
        subscribeToAttendance();
    } else {
        refreshCurrentView();
    }
};

window.goToToday = () => changeDate(state.todayRealStr);

// ─── 뷰 전환 ───────────────────────────────────────────────────────────────
window.switchView = (view) => {
    state.currentView = view;
    document.getElementById('view-teacher').classList.toggle('hidden', view !== 'teacher');
    document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');

    const activeClass   = 'bg-white shadow-sm text-indigo-600';
    const inactiveClass = 'text-slate-500 hover:bg-slate-200';
    const base          = 'no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all';

    document.getElementById('btn-teacher').className = `${base} ${view === 'teacher' ? activeClass : inactiveClass}`;
    document.getElementById('btn-admin').className   = `${base} ${view === 'admin'   ? activeClass : inactiveClass}`;

    refreshCurrentView();
};

function refreshCurrentView() {
    if (state.currentView === 'teacher') renderStudents();
    else updateAdminStats();
}

// ─── 반 선택 ───────────────────────────────────────────────────────────────
window.setGrade = (g) => {
    state.selectedGrade = g;
    state.selectedClass = null;
    renderClassButtons();
    updateGradeUI();
    resetStudentContainer();
};

window.setClass = (c) => {
    state.selectedClass = c;
    updateClassUI();
    renderStudents();
};

function renderClassButtons() {
    const container = document.getElementById('class-grid');
    container.innerHTML = '';
    const count = CLASS_CONFIG[state.selectedGrade] || 0;
    for (let i = 1; i <= count; i++) {
        const btn = document.createElement('button');
        btn.className = 'class-btn px-2 py-3 border rounded-xl font-bold md:text-lg transition-all hover:bg-slate-50';
        btn.textContent = `${i}반`;
        btn.dataset.class = i;
        btn.addEventListener('click', () => setClass(i));
        container.appendChild(btn);
    }
}

function updateGradeUI() {
    document.querySelectorAll('.grade-btn').forEach(b => {
        const active = parseInt(b.dataset.grade) === state.selectedGrade;
        b.classList.toggle('bg-indigo-600', active);
        b.classList.toggle('text-white',    active);
        b.classList.toggle('border-indigo-600', active);
    });
}

function updateClassUI() {
    document.querySelectorAll('.class-btn').forEach(b => {
        const active = parseInt(b.dataset.class) === state.selectedClass;
        b.classList.toggle('bg-indigo-600', active);
        b.classList.toggle('text-white',    active);
        b.classList.toggle('border-indigo-600', active);
    });
}

function resetStudentContainer() {
    const hasClass = !!state.selectedClass;
    document.getElementById('no-class-selected').classList.toggle('hidden', hasClass);
    document.getElementById('student-container').classList.toggle('hidden', !hasClass);
    document.getElementById('class-info-card').classList.toggle('hidden', !hasClass);
}

// ─── 학생 카드 렌더링 ──────────────────────────────────────────────────────
function renderStudents() {
    if (!state.selectedGrade || !state.selectedClass) return;
    resetStudentContainer();

    const teacher = state.teachersData[`${state.selectedGrade}_${state.selectedClass}`] || '미배정';
    const titleEl = document.getElementById('selected-class-title');
    titleEl.textContent = '';
    titleEl.appendChild(document.createTextNode(`${state.selectedGrade}학년 ${state.selectedClass}반 `));
    const small = document.createElement('span');
    small.className = 'text-xs font-normal opacity-60';
    small.textContent = `(담임: ${teacher})`;
    titleEl.appendChild(small);

    document.getElementById('period-info-text').textContent = `전 학년 ${MAX_PERIOD}차시까지 운영됩니다.`;

    const docId   = makeDocId();
    const data    = state.attendanceData[docId] || {};
    const students = getStudents(state.selectedGrade, state.selectedClass);
    const grid    = document.getElementById('student-grid');
    grid.innerHTML = '';

    students.forEach(s => {
        const sData = data[s.id] || emptyAttendance();
        grid.appendChild(buildStudentCard(s, sData));
    });
    updateSummary(students, data);
}

/** [품질개선] innerHTML 대신 DOM API로 카드 생성 → XSS 위험 제거 */
function buildStudentCard(student, sData) {
    const card = document.createElement('div');
    card.className = 'bg-white border border-slate-100 rounded-2xl p-4 shadow-sm flex flex-col items-center gap-4 hover:shadow-md transition-all';
    card.dataset.studentId = student.id;

    // 이름 영역
    const nameWrap = document.createElement('div');
    nameWrap.className = 'text-center';

    const noBadge = document.createElement('span');
    noBadge.className = 'text-[11px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full border';
    noBadge.textContent = `${student.no}번`;

    const nameDiv = document.createElement('div');
    nameDiv.className = 'text-xl font-black mt-1 text-slate-800';
    nameDiv.textContent = student.name;

    nameWrap.appendChild(noBadge);
    nameWrap.appendChild(nameDiv);

    // 차시 버튼 영역
    const btnRow = document.createElement('div');
    btnRow.className = 'flex gap-2 w-full pt-3 border-t border-slate-50';

    for (let p = 1; p <= MAX_PERIOD; p++) {
        const col = document.createElement('div');
        col.className = 'flex flex-col items-center flex-1';

        const label = document.createElement('span');
        label.className = 'text-[10px] font-bold text-slate-400 mb-1';
        label.textContent = `${p}차`;

        const btn = document.createElement('button');
        btn.className = 'w-10 h-10 md:w-12 md:h-12 rounded-xl border-2 font-bold transition-all';
        btn.dataset.period = p;
        applyStatusClass(btn, sData[`p${p}`]);

        btn.addEventListener('click', () => toggleStatus(student.id, p));

        col.appendChild(label);
        col.appendChild(btn);
        btnRow.appendChild(col);
    }

    card.appendChild(nameWrap);
    card.appendChild(btnRow);
    return card;
}

function applyStatusClass(btn, status) {
    btn.classList.remove('status-present', 'status-absent', 'status-none');
    if (status === 1) {
        btn.classList.add('status-present');
        btn.textContent = '출';
    } else if (status === 2) {
        btn.classList.add('status-absent');
        btn.textContent = '결';
    } else {
        btn.classList.add('status-none');
        btn.textContent = '-';
    }
}

// ─── 출결 토글 ─────────────────────────────────────────────────────────────
/**
 * [성능개선] 전체 카드를 재렌더링하지 않고 해당 버튼만 DOM에서 직접 업데이트.
 * [버그수정] showToast()를 Firestore 저장 성공/실패 시 실제로 호출.
 */
window.toggleStatus = async (studentId, period) => {
    const docId  = makeDocId();
    const curData = state.attendanceData[docId] || {};
    const sData  = Object.assign(emptyAttendance(), curData[studentId] || {});

    const next = nextStatus(sData[`p${period}`]);
    sData[`p${period}`] = next;

    // 결석(2) 또는 미입력(0)으로 변경 시, 이후 차시도 같은 상태로 연동
    if (next === 2 || next === 0) {
        for (let i = period + 1; i <= MAX_PERIOD; i++) sData[`p${i}`] = next;
    }

    curData[studentId] = sData;
    state.attendanceData[docId] = curData;

    // DOM 직접 업데이트 (카드 전체 재렌더링 없음)
    const card = document.querySelector(`[data-student-id="${studentId}"]`);
    if (card) {
        const btns = card.querySelectorAll('button[data-period]');
        btns.forEach(btn => {
            const p = parseInt(btn.dataset.period);
            applyStatusClass(btn, sData[`p${p}`]);
        });
    }

    // 사이드 요약 갱신
    const students = getStudents(state.selectedGrade, state.selectedClass);
    updateSummary(students, curData);

    // Firestore 저장
    if (db && user) {
        try {
            const colPath = `attendance_${state.currentMonthStr}`;
            await setDoc(
                doc(db, 'artifacts', APP_ID, 'public', 'data', colPath, docId),
                { data: curData },
                { merge: true }
            );
        } catch (e) {
            console.error('저장 오류:', e);
            showToast('저장 실패. 네트워크를 확인해주세요.', 'error');
        }
    }
};

window.clearAllAttendance = async () => {
    if (!confirm('해당 학급의 기록을 모두 지우시겠습니까?')) return;
    const docId  = makeDocId();
    const empty  = {};
    getStudents(state.selectedGrade, state.selectedClass)
        .forEach(s => { empty[s.id] = emptyAttendance(); });

    state.attendanceData[docId] = empty;
    renderStudents();

    if (db && user) {
        try {
            const colPath = `attendance_${state.currentMonthStr}`;
            await setDoc(
                doc(db, 'artifacts', APP_ID, 'public', 'data', colPath, docId),
                { data: empty },
                { merge: true }
            );
            showToast('초기화 완료');
        } catch (e) {
            console.error('초기화 오류:', e);
            showToast('초기화 실패. 네트워크를 확인해주세요.', 'error');
        }
    }
};

function updateSummary(students, data) {
    const container = document.getElementById('class-stats-container');
    container.innerHTML = '';
    for (let p = 1; p <= MAX_PERIOD; p++) {
        const count = students.filter(s => (data[s.id] || {})[`p${p}`] === 1).length;
        const row = document.createElement('div');
        row.className = 'text-xs md:text-sm text-indigo-800 flex justify-between items-center bg-white/60 px-3 py-2 rounded-lg border border-indigo-100 shadow-sm';
        const lbl = document.createElement('span');
        lbl.className = 'font-bold';
        lbl.textContent = `${p}차시`;
        const val = document.createElement('span');
        val.className = 'font-extrabold';
        val.textContent = `${count}명 출석`;
        row.appendChild(lbl);
        row.appendChild(val);
        container.appendChild(row);
    }
}

// ─── 관리자 통계 ───────────────────────────────────────────────────────────
/**
 * [버그수정] 관리자 뷰 행 클릭 → 교사 뷰 이동 시 setGrade 후 selectedClass null 리셋 문제.
 * setGrade와 setClass를 직접 내부 호출하지 않고 상태를 먼저 세팅한 뒤 UI를 한번에 갱신.
 */
function gotoTeacherView(grade, cls) {
    state.selectedGrade = grade;
    state.selectedClass = cls;
    switchView('teacher');
    renderClassButtons();
    updateGradeUI();
    updateClassUI();
    renderStudents();
}

function updateAdminStats() {
    const body = document.getElementById('admin-table-body');
    body.innerHTML = '';
    let totalPresent = 0, totalSlots = 0;

    for (let g = 1; g <= MAX_GRADE; g++) {
        for (let c = 1; c <= CLASS_CONFIG[g]; c++) {
            const students = getStudents(g, c);
            const docId    = `${state.currentDateStr}_${g}_${c}`;
            const data     = state.attendanceData[docId] || {};

            const pCounts = Array.from({ length: MAX_PERIOD }, (_, i) =>
                students.filter(s => data[s.id]?.[`p${i + 1}`] === 1).length
            );
            const pSum = pCounts.reduce((a, b) => a + b, 0);
            const per  = students.length > 0
                ? (pSum / (students.length * MAX_PERIOD) * 100).toFixed(1)
                : '0.0';

            const row = document.createElement('tr');
            row.className = 'hover:bg-slate-50 cursor-pointer';
            row.addEventListener('click', () => gotoTeacherView(g, c));

            const cells = [
                { text: `${g}-${c}`, cls: 'font-bold' },
                { text: state.teachersData[`${g}_${c}`] || '-' },
                { text: students.length },
                ...pCounts.map(n => ({ text: n, center: true, bold: true })),
                { text: `${per}%`, right: true, bold: true, indigo: true }
            ];

            cells.forEach(({ text, cls: extraCls = '', center, right, bold, indigo }) => {
                const td = document.createElement('td');
                td.className = `px-5 py-4${center ? ' text-center' : ''}${right ? ' text-right' : ''}${bold ? ' font-bold' : ''}${indigo ? ' text-indigo-600' : ''} ${extraCls}`.trim();
                td.textContent = text;
                row.appendChild(td);
            });

            body.appendChild(row);
            totalPresent += pSum;
            totalSlots   += students.length * MAX_PERIOD;
        }
    }

    document.getElementById('admin-total-percent').textContent =
        totalSlots > 0 ? (totalPresent / totalSlots * 100).toFixed(1) + '%' : '0.0%';
}

// ─── 엑셀 출력 ─────────────────────────────────────────────────────────────
/**
 * [버그수정] colspan을 하드코딩 19 → 실제 열 수로 계산.
 * 열 구조: 빈칸(1) + 학년별 [반,재적,1차~4차](6열) × 3학년 = 1 + 18 = 19
 * 각 학년의 최대 반 수가 다르므로 실제 행별로 colspan 계산.
 */
window.exportToExcel = () => {
    const formattedDate = state.currentDateStr.replace(/-/g, '.');
    const maxClass = Math.max(...Object.values(CLASS_CONFIG));
    // 헤더: 학년별 6열 (반, 재적, 1차~4차) × 3학년 + 앞 빈칸 1
    const totalCols = 1 + MAX_GRADE * (1 + 1 + MAX_PERIOD);

    // 헤더 행
    let headerGrade = '<tr><td></td>';
    for (let g = 1; g <= MAX_GRADE; g++) {
        headerGrade += `<td colspan="${1 + 1 + MAX_PERIOD}" style="border:0.5pt solid black;text-align:center;font-weight:bold;">${g}학년</td>`;
    }
    headerGrade += '</tr>';

    let headerLabel = '<tr><td style="border:0.5pt solid black;text-align:center;">반</td>';
    for (let g = 1; g <= MAX_GRADE; g++) {
        headerLabel += '<td style="border:0.5pt solid black;text-align:center;">반</td>';
        headerLabel += '<td style="border:0.5pt solid black;text-align:center;">재적</td>';
        for (let p = 1; p <= MAX_PERIOD; p++) {
            headerLabel += `<td style="border:0.5pt solid black;text-align:center;">${p}차</td>`;
        }
    }
    headerLabel += '</tr>';

    let rowsHtml = '';
    for (let c = 1; c <= maxClass; c++) {
        rowsHtml += `<tr><td style="border:0.5pt solid black;text-align:center;">${c}반</td>`;
        for (let g = 1; g <= MAX_GRADE; g++) {
            if (c <= CLASS_CONFIG[g]) {
                const students = getStudents(g, c);
                const data     = state.attendanceData[`${state.currentDateStr}_${g}_${c}`] || {};
                const pCounts  = Array.from({ length: MAX_PERIOD }, (_, i) =>
                    students.filter(s => data[s.id]?.[`p${i + 1}`] === 1).length
                );
                rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${c}</td>`;
                rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${students.length}</td>`;
                pCounts.forEach(n => {
                    rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${n}</td>`;
                });
            } else {
                rowsHtml += `<td colspan="${1 + 1 + MAX_PERIOD}" style="border:0.5pt solid black;"></td>`;
            }
        }
        rowsHtml += '</tr>';
    }

    const html = `<html><head><meta charset='utf-8'><style>td{vertical-align:middle;}</style></head><body>
<table>
<tr><td colspan="${totalCols}" style="text-align:center;font-size:16pt;font-weight:bold;">자율학습 참여현황 (${formattedDate})</td></tr>
${headerGrade}${headerLabel}${rowsHtml}
</table></body></html>`;

    const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `참여현황_${state.currentDateStr}.xls`;
    a.click();
    URL.revokeObjectURL(a.href); // 메모리 해제
};

// ─── Firestore 연동 ────────────────────────────────────────────────────────
function subscribeToAttendance() {
    if (!db || !user) return;
    if (unsubAttendance) unsubAttendance();

    const colPath = `attendance_${state.currentMonthStr}`;
    const colRef  = collection(db, 'artifacts', APP_ID, 'public', 'data', colPath);

    unsubAttendance = onSnapshot(colRef, snapshot => {
        state.attendanceData = {};
        snapshot.forEach(d => { state.attendanceData[d.id] = d.data().data || {}; });
        refreshCurrentView();
    }, err => {
        if (err.code === 'permission-denied') {
            console.error('Firestore 권한 없음:', colPath);
        } else {
            console.error('Firestore 오류:', err);
            showToast('데이터 연결 오류', 'error');
        }
    });
}

/** docId 헬퍼 */
function makeDocId() {
    return `${state.currentDateStr}_${state.selectedGrade}_${state.selectedClass}`;
}

// ─── 초기화 ────────────────────────────────────────────────────────────────
async function init() {
    state.todayRealStr   = getTodayLocalStr(); // [버그수정] 타임존 안전 함수 사용
    state.studentsByClass = parseStudentCSV(defaultStudentText);
    state.teachersData    = parseTeacherCSV(defaultTeacherText);

    setDateVariables(state.todayRealStr);
    switchView('teacher');

    if (typeof lucide !== 'undefined') lucide.createIcons();

    try {
        if (typeof __firebase_config !== 'undefined') {
            const cfg    = JSON.parse(__firebase_config);
            const appObj = initializeApp(cfg);
            auth = getAuth(appObj);
            db   = getFirestore(appObj);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, u => {
                user = u;
                if (user) subscribeToAttendance();
            });
        }
    } catch (e) {
        console.error('Firebase 연결 오류:', e);
        showToast('Firebase 연결 실패', 'error');
    }
}

init();
</script>
