<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고교 야간 자율학습 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .touch-target { min-height: 48px; min-width: 48px; }
        .status-present { background-color: #dcfce7; color: #166534; border-color: #86efac; }
        .status-absent { background-color: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .status-none { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        button:active { transform: scale(0.95); }
        .no-scale:active { transform: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 relative">
    <div id="app" class="max-w-7xl mx-auto p-4 md:p-6 pb-20">
        <!-- Header -->
        <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-4 mb-8 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2 text-indigo-700 shrink-0">
                <i data-lucide="calendar-check" class="w-6 h-6"></i>
                야간 자율학습
            </h1>
            
            <div class="flex flex-col md:flex-row items-center justify-between xl:justify-end w-full gap-4">
                <!-- 날짜 선택기 -->
                <div class="flex items-center w-full md:w-auto justify-between md:justify-start">
                    <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0">
                        <button onclick="adjustDate('day', -1)" class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <div class="relative flex items-center justify-center px-2 md:px-4 h-10 hover:bg-white hover:shadow-sm rounded-lg transition-all cursor-pointer">
                            <input type="date" id="date-selector" onchange="changeDate(this.value)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <span id="current-date-display" class="text-sm md:text-base font-bold text-slate-800 pointer-events-none whitespace-nowrap">로딩 중...</span>
                        </div>
                        <button onclick="adjustDate('day', 1)" id="btn-day-plus" class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex items-center gap-2 ml-3">
                        <button id="btn-today" onclick="goToToday()" class="hidden no-scale px-3 py-2 bg-indigo-50 text-indigo-600 border border-indigo-100 text-sm font-bold rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1.5 whitespace-nowrap">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 오늘
                        </button>
                        <span id="date-warning" class="hidden px-2.5 py-2 bg-rose-50 text-rose-600 border border-rose-100 text-xs font-bold rounded-lg flex items-center gap-1 animate-pulse whitespace-nowrap">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 과거 데이터
                        </span>
                    </div>
                </div>
                
                <!-- 탭 메뉴 -->
                <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0 w-full md:w-auto">
                    <button id="btn-teacher" onclick="switchView('teacher')" class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all">교사(출석체크)</button>
                    <button id="btn-admin" onclick="switchView('admin')" class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all">관리자(통계)</button>
                </div>
            </div>
        </header>

        <!-- VIEW: TEACHER -->
        <main id="view-teacher" class="hidden animate-in fade-in duration-500">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-4">반 선택</label>
                        <div class="space-y-4">
                            <div>
                                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">학년</span>
                                <div class="grid grid-cols-3 gap-2 mt-2">
                                    <button onclick="setGrade(1)" class="grade-btn px-3 py-3 border rounded-xl font-bold transition-all" data-grade="1">1</button>
                                    <button onclick="setGrade(2)" class="grade-btn px-3 py-3 border rounded-xl font-bold transition-all" data-grade="2">2</button>
                                    <button onclick="setGrade(3)" class="grade-btn px-3 py-3 border rounded-xl font-bold transition-all" data-grade="3">3</button>
                                </div>
                            </div>
                            <div>
                                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">반</span>
                                <div id="class-grid" class="grid grid-cols-4 gap-2 mt-2"></div>
                            </div>
                        </div>
                    </div>
                    <div id="class-info-card" class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 hidden">
                        <h3 class="font-bold text-indigo-900 mb-3" id="selected-class-title">학년 반</h3>
                        <div id="class-stats-container" class="space-y-2 mb-4"></div>
                    </div>
                </div>

                <div class="lg:col-span-3 space-y-4">
                    <div id="no-class-selected" class="bg-white border-2 border-dashed border-slate-200 rounded-2xl h-96 flex flex-col items-center justify-center text-slate-400">
                        <i data-lucide="mouse-pointer-2" class="w-12 h-12 mb-2"></i>
                        <p>학년과 반을 선택해주세요.</p>
                    </div>
                    <div id="student-container" class="hidden">
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-semibold text-slate-500 hidden md:inline">안내:</span>
                                <div class="text-sm font-medium text-slate-600" id="period-info-text"></div>
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                                <button onclick="clearAllAttendance()" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-100 rounded-lg text-xs font-bold transition-colors flex items-center gap-1 shadow-sm no-scale">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 모두 지우기
                                </button>
                            </div>
                        </div>
                        <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- VIEW: ADMIN -->
        <main id="view-admin" class="hidden animate-in fade-in duration-500">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">

                    </div>
                    <div class="flex gap-4">

                    </div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg transform translate-y-20 transition-transform duration-300 z-50"></div>
    </div>

        function init() {
            const offset = new Date().getTimezoneOffset() * 60000;
            todayRealStr = (new Date(Date.now() - offset)).toISOString().slice(0, 10);
            allStudents = parseStudentCSV(defaultStudentText);
            teachersData = parseTeacherCSV(defaultTeacherText);
            setDateVariables(todayRealStr);
            switchView('teacher');
            lucide.createIcons();

            try {
                if (typeof __firebase_config !== 'undefined') {
                    const cfg = JSON.parse(__firebase_config);
                    const appObj = initializeApp(cfg);
                    auth = getAuth(appObj);
                    db = getFirestore(appObj);
                    signInAnonymously(auth);
                    onAuthStateChanged(auth, u => { user = u; if (user) subscribeToAttendance(); });
                }
            } catch (e) { console.warn("Offline Mode"); }
        }

        window.switchView = (view) => {
            currentView = view;
            document.getElementById('view-teacher').classList.toggle('hidden', view !== 'teacher');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
            const bt = document.getElementById('btn-teacher');
            const ba = document.getElementById('btn-admin');
            bt.className = `no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all ${view==='teacher'?'bg-white shadow-sm text-indigo-600':'text-slate-500 hover:bg-slate-200'}`;
            ba.className = `no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all ${view==='admin'?'bg-white shadow-sm text-indigo-600':'text-slate-500 hover:bg-slate-200'}`;
            if (view === 'admin') updateAdminStats(); else renderStudents();
        };

        window.setGrade = (g) => { selectedGrade = g; selectedClass = null; renderClassButtons(); updateSelectionUI(); resetStudentContainer(); };
        window.setClass = (c) => { selectedClass = c; updateSelectionUI(); renderStudents(); };

        function renderClassButtons() {
            const container = document.getElementById('class-grid'); container.innerHTML = '';
            for (let i = 1; i <= classConfig[selectedGrade]; i++) {
                const btn = document.createElement('button');
                btn.className = 'class-btn px-2 py-3 border rounded-xl font-bold md:text-lg transition-all hover:bg-slate-50';
                btn.textContent = `${i}반`; btn.onclick = () => setClass(i);
                container.appendChild(btn);
            }
        }

        function updateSelectionUI() {
            document.querySelectorAll('.grade-btn').forEach(b => {
                const g = parseInt(b.dataset.grade);
                b.classList.toggle('bg-indigo-600', g === selectedGrade);
                b.classList.toggle('text-white', g === selectedGrade);
            });
            document.querySelectorAll('.class-btn').forEach((b, idx) => {
                b.classList.toggle('bg-indigo-600', (idx+1) === selectedClass);
                b.classList.toggle('text-white', (idx+1) === selectedClass);
            });
        }

        function resetStudentContainer() {
            document.getElementById('no-class-selected').classList.toggle('hidden', !!selectedClass);
            document.getElementById('student-container').classList.toggle('hidden', !selectedClass);
            document.getElementById('class-info-card').classList.toggle('hidden', !selectedClass);
        }

        function setDateVariables(dateString) {
            currentDateStr = dateString; currentMonthStr = dateString.substring(0, 7);
            const dateObj = new Date(dateString);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('current-date-display').textContent = `${dateString.replace(/-/g, '.')} (${days[dateObj.getDay()]})`;
            document.getElementById('date-selector').value = dateString;
            document.getElementById('btn-day-plus').disabled = dateString >= todayRealStr;
            document.getElementById('btn-day-plus').classList.toggle('opacity-30', dateString >= todayRealStr);
            document.getElementById('date-warning').classList.toggle('hidden', dateString === todayRealStr);
            document.getElementById('btn-today').classList.toggle('hidden', dateString === todayRealStr);
        }

        window.adjustDate = (unit, delta) => {
            const d = new Date(currentDateStr); d.setDate(d.getDate() + delta);
            const next = d.toISOString().slice(0, 10);
            if (next <= todayRealStr) changeDate(next);
        };

        window.changeDate = (newDate) => {
            const oldM = currentMonthStr; setDateVariables(newDate);
            if (oldM !== currentMonthStr && user && db) subscribeToAttendance(); else if (currentView === 'teacher') renderStudents(); else updateAdminStats();
        };

        window.goToToday = () => changeDate(todayRealStr);

        function renderStudents() {
            if (!selectedGrade || !selectedClass) return;
            resetStudentContainer();
            const teacher = teachersData[`${selectedGrade}_${selectedClass}`] || '미배정';
            document.getElementById('selected-class-title').innerHTML = `${selectedGrade}학년 ${selectedClass}반 <span class="text-xs font-normal text-slate-500 ml-1">(담임: ${teacher})</span>`;
            const maxP = selectedGrade === 3 ? 4 : 3;
            document.getElementById('period-info-text').textContent = `${selectedGrade}학년은 ${maxP}차시까지 운영됩니다.`;
            
            const grid = document.getElementById('student-grid'); grid.innerHTML = '';
            const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
            const data = attendanceData[`${currentDateStr}_${selectedGrade}_${selectedClass}`] || {};

            students.forEach(s => {
                const sData = data[s.id] || { p1: 0, p2: 0, p3: 0, p4: 0 };
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-100 rounded-xl p-2 px-3 shadow-sm flex items-center justify-between gap-2';
                let btns = '';
                for (let p = 1; p <= maxP; p++) {
                    const st = sData[`p${p}`];
                    const cls = st === 1 ? 'status-present' : (st === 2 ? 'status-absent' : 'status-none');
                    const txt = st === 1 ? '출' : (st === 2 ? '결' : '-');
                    btns += `<div class="flex flex-col items-center">
                        <span class="text-[10px] font-bold text-slate-400 mb-1">${p}차</span>
                        <button onclick="toggleStatus('${s.id}', ${p})" class="w-9 h-9 rounded-lg border-2 font-bold text-sm flex items-center justify-center transition-all ${cls}">${txt}</button>
                    </div>`;
                }
                card.innerHTML = `<div class="flex-1 leading-tight"><span class="text-[11px] text-slate-400 font-bold">${s.no}번</span><br><span class="text-base font-bold">${s.name}</span></div><div class="flex gap-1">${btns}</div>`;
                grid.appendChild(card);
            });
            updateSummary(students, data, maxP);
        }

        window.toggleStatus = async (id, p) => {
            const docId = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
            const curData = attendanceData[docId] || {};
            const sData = curData[id] || { p1:0, p2:0, p3:0, p4:0 };
            const next = (sData[`p${p}`] + 1) % 3;
            sData[`p${p}`] = next;
            const maxP = selectedGrade === 3 ? 4 : 3;
            if (next === 2 || next === 0) { for (let i = p + 1; i <= maxP; i++) sData[`p${i}`] = next; }
            curData[id] = sData; attendanceData[docId] = curData; renderStudents();
            if (db && user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendance_${currentMonthStr}`, docId), { data: curData }, { merge: true });
        };

        window.clearAllAttendance = async () => {
            if (!confirm("기록을 모두 지우시겠습니까?")) return;
            const docId = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
            const empty = {};
            allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass).forEach(s => { empty[s.id] = { p1:0, p2:0, p3:0, p4:0 }; });
            attendanceData[docId] = empty; renderStudents();
            if (db && user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendance_${currentMonthStr}`, docId), { data: empty }, { merge: true });
        };

        function updateSummary(students, data, maxP) {
            const container = document.getElementById('class-stats-container'); container.innerHTML = '';
            for (let p = 1; p <= maxP; p++) {
                const count = students.filter(s => (data[s.id] || {})[`p${p}`] === 1).length;
                const per = students.length > 0 ? Math.round((count / students.length) * 100) : 0;
                const row = document.createElement('div');
                row.className = 'text-xs md:text-sm text-indigo-800 flex justify-between items-center bg-white/60 px-3 py-2 rounded-lg border border-indigo-100 shadow-sm';
                row.innerHTML = `<span class="font-bold">${p}차시</span><span class="font-extrabold">${count} / ${students.length}명 (${per}%)</span>`;
                container.appendChild(row);
            }
        }

        function updateAdminStats() {
            const body = document.getElementById('admin-table-body'); body.innerHTML = '';
            let totalP = 0, totalT = 0;
            for (let g = 1; g <= 3; g++) {
                for (let c = 1; c <= classConfig[g]; c++) {
                    const students = allStudents.filter(s => s.grade === g && s.class === c);
                    const data = attendanceData[`${currentDateStr}_${g}_${c}`] || {};
                    let pCounts = [0,0,0,0];
                    students.forEach(s => { for (let i=0; i<4; i++) if (data[s.id]?.[`p${i+1}`] === 1) pCounts[i]++; });
                    const pSum = pCounts.reduce((a,b)=>a+b, 0);
                    const per = students.length > 0 ? (pSum / (students.length * (g===3?4:3)) * 100).toFixed(1) : "0.0";
                    const row = document.createElement('tr'); row.className = 'hover:bg-slate-50 cursor-pointer';
                    row.onclick = () => { switchView('teacher'); setGrade(g); setClass(c); };
                    row.innerHTML = `<td class="px-5 py-4 font-bold">${g}-${c}</td><td class="px-5 py-4">${teachersData[`${g}_${c}`] || '-'}</td><td class="px-5 py-4">${students.length}</td><td class="px-5 py-4 text-center font-bold">${pCounts[0]}</td><td class="px-5 py-4 text-center font-bold">${pCounts[1]}</td><td class="px-5 py-4 text-center font-bold">${pCounts[2]}</td><td class="px-5 py-4 text-center ${g<3?'text-slate-200':''}">${g===3?pCounts[3]:'-'}</td><td class="px-5 py-4 text-right font-bold text-indigo-600">${per}%</td>`;
                    body.appendChild(row);
                    totalP += pSum; totalT += students.length * (g===3?4:3);
                }
            }
            document.getElementById('admin-total-percent').textContent = totalT > 0 ? (totalP / totalT * 100).toFixed(1) + '%' : '0.0%';
        }

        function parseStudentCSV(t) { return t.trim().split('\n').slice(1).map(l => { const [h, n] = l.split(','); const hs = h.trim(); if (hs.length === 5) return { id: hs, grade: parseInt(hs[0]), class: parseInt(hs.substring(1, 3)), no: parseInt(hs.substring(3, 5)), name: n.trim() }; }).filter(Boolean); }
        function parseTeacherCSV(t) { const obj = {}; t.trim().split('\n').slice(1).forEach(l => { const p = l.split(','); if (p.length >= 3) { const g = parseInt(p[0].match(/\d+/)[0]); const c = parseInt(p[1].match(/\d+/)[0]); obj[`${g}_${c}`] = p[2].trim(); } }); return obj; }
        function subscribeToAttendance() {
            if (!db) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `attendance_${currentMonthStr}`), s => {
                attendanceData = {}; s.forEach(d => attendanceData[d.id] = d.data().data || {});
                if (currentView === 'teacher') renderStudents(); else updateAdminStats();
            });
        }

        window.exportToExcel = () => {
            let table = '<table><tr><td colspan="8">참여현황</td></tr>';
            table += document.querySelector('table').innerHTML;
            table += '</table>';
            const blob = new Blob([`<html><head><meta charset="utf-8"></head><body>${table}</body></html>`], { type: 'application/vnd.ms-excel' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `참여현황_${currentDateStr}.xls`; a.click();
        };

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.remove('translate-y-20'); setTimeout(() => t.classList.add('translate-y-20'), 2000); }

        init();
    </script>
</body>
</html>
