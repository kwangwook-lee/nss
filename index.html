<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고교 야간 자율학습 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .touch-target { min-height: 48px; min-width: 48px; }
        .status-present { background-color: #dcfce7; color: #166534; border-color: #86efac; }
        .status-absent { background-color: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .status-none { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        button:active { transform: scale(0.95); }
        .no-scale:active { transform: none; }
        /* 달력 아이콘 숨기기 (전체 영역 클릭으로 대체) */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 relative">
    <div id="app" class="max-w-7xl mx-auto p-4 md:p-6 pb-20">
        <!-- Header -->
        <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-4 mb-8 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2 text-indigo-700 shrink-0">
                <i data-lucide="calendar-check" class="w-6 h-6"></i>
                야간 자율학습
            </h1>
            
            <div class="flex flex-col md:flex-row items-center justify-between xl:justify-end w-full gap-4">
                <!-- 컴팩트한 한 줄 날짜 선택기 -->
                <div class="flex items-center w-full md:w-auto justify-between md:justify-start">
                    <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0">
                        <button onclick="adjustDate('day', -1)" class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        
                        <div class="relative flex items-center justify-center px-2 md:px-4 h-10 hover:bg-white hover:shadow-sm rounded-lg transition-all cursor-pointer">
                            <input type="date" id="date-selector" onchange="changeDate(this.value)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <span id="current-date-display" class="text-sm md:text-base font-bold text-slate-800 pointer-events-none whitespace-nowrap">2026. 03. 27 (금)</span>
                        </div>

                        <button onclick="adjustDate('day', 1)" id="btn-day-plus" class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>

                    <!-- 날짜 오류 방지 UI -->
                    <div class="flex items-center gap-2 ml-3">
                        <button id="btn-today" onclick="goToToday()" class="hidden no-scale px-3 py-2 bg-indigo-50 text-indigo-600 border border-indigo-100 text-sm font-bold rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1.5 whitespace-nowrap">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 오늘
                        </button>
                        <span id="date-warning" class="hidden px-2.5 py-2 bg-rose-50 text-rose-600 border border-rose-100 text-xs font-bold rounded-lg flex items-center gap-1 animate-pulse whitespace-nowrap">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 과거 데이터
                        </span>
                    </div>
                </div>
                
                <!-- 탭 메뉴 -->
                <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0 w-full md:w-auto">
                    <button id="btn-teacher" onclick="switchView('teacher')" class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all bg-white shadow-sm text-indigo-600">교사(출석체크)</button>
                    <button id="btn-admin" onclick="switchView('admin')" class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all text-slate-500 hover:bg-slate-200">관리자(통계)</button>
                </div>
            </div>
        </header>

        <!-- Loading Overlay -->
        <div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center hidden">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-medium text-slate-600">데이터를 처리하는 중...</p>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg transform translate-y-20 transition-transform duration-300 z-50 flex items-center gap-2">
            <span id="toast-icon-container">
                <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>
            </span>
            <span id="toast-message">저장되었습니다.</span>
        </div>

        <!-- VIEW: TEACHER -->
        <main id="view-teacher" class="hidden animate-in fade-in duration-500">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- Select Class Side -->
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-4">반 선택</label>
                        <div class="space-y-4">
                            <div>
                                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">학년</span>
                                <div class="grid grid-cols-3 gap-2 mt-2">
                                    <button onclick="setGrade(1)" class="grade-btn px-3 py-3 border rounded-xl font-bold md:text-lg" data-grade="1">1</button>
                                    <button onclick="setGrade(2)" class="grade-btn px-3 py-3 border rounded-xl font-bold md:text-lg" data-grade="2">2</button>
                                    <button onclick="setGrade(3)" class="grade-btn px-3 py-3 border rounded-xl font-bold md:text-lg" data-grade="3">3</button>
                                </div>
                            </div>
                            <div>
                                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">반</span>
                                <div id="class-grid" class="grid grid-cols-4 gap-2 mt-2">
                                    <!-- Dynamic class buttons -->
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="class-info-card" class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 hidden">
                        <h3 class="font-bold text-indigo-900 mb-3" id="selected-class-title">학년 반</h3>
                        <div id="class-stats-container" class="space-y-2 mb-4">
                            <!-- 차시별 출석 통계 -->
                        </div>
                        
                        <!-- AI Teacher Integration -->
                        <div class="pt-4 border-t border-indigo-100/50">
                            <button onclick="generateCheerMessage()" class="w-full px-4 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-lg text-sm font-bold transition-all shadow-sm flex items-center justify-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4"></i> AI 학생 응원 메시지 생성 ✨
                            </button>
                            <div id="ai-cheer-message" class="hidden mt-3 p-4 bg-white/80 backdrop-blur-sm rounded-xl text-sm leading-relaxed text-indigo-900 border border-indigo-100 shadow-sm relative">
                                <!-- Message injected here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Student List Grid -->
                <div class="lg:col-span-3 space-y-4">
                    <div id="no-class-selected" class="bg-white border-2 border-dashed border-slate-200 rounded-2xl h-96 flex flex-col items-center justify-center text-slate-400">
                        <i data-lucide="mouse-pointer-2" class="w-12 h-12 mb-2"></i>
                        <p>학년과 반을 선택해주세요.</p>
                    </div>

                    <div id="student-container" class="hidden">
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-4 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <span class="text-sm font-semibold text-slate-500">안내:</span>
                                <div class="text-sm font-medium text-slate-600" id="period-info-text">
                                    -
                                </div>
                            </div>
                            <div class="text-xs text-slate-400 italic font-semibold bg-slate-50 px-3 py-1 rounded-full border border-slate-100 hidden sm:block">터치: 미기입 → 출결전환</div>
                        </div>
                        
                        <div id="student-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-2.5">
                            <!-- Student cards -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- VIEW: ADMIN -->
        <main id="view-admin" class="hidden animate-in fade-in duration-500">
            <!-- Admin Top Controls -->
            <div class="flex flex-col sm:flex-row items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6">
                <div class="flex items-center gap-3">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-600"></i>
                    <span class="font-bold text-slate-800">통계 보기 방식</span>
                </div>
                <div class="flex items-center gap-3 mt-3 sm:mt-0 flex-wrap justify-end">
                    <!-- AI Briefing Button -->
                    <button onclick="generateAIBriefing()" class="no-scale px-4 py-2 rounded-md text-sm font-bold bg-gradient-to-r from-amber-100 to-orange-100 text-amber-800 hover:from-amber-200 hover:to-orange-200 border border-amber-200 transition-all flex items-center gap-2 shadow-sm">
                        <i data-lucide="sparkles" class="w-4 h-4 text-amber-600"></i>
                        AI 보고용 브리핑 ✨
                    </button>

                    <!-- 엑셀 다운로드 버튼 -->
                    <button onclick="exportToCSV()" class="no-scale px-4 py-2 rounded-md text-sm font-bold bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-100 transition-all flex items-center gap-2">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                        참여현황 엑셀 다운로드
                    </button>
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button id="stat-btn-daily" onclick="setStatType('daily')" class="no-scale px-4 py-2 rounded-md text-sm font-bold bg-white shadow-sm text-indigo-600 transition-all">일간 통계</button>
                        <button id="stat-btn-monthly" onclick="setStatType('monthly')" class="no-scale px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:bg-slate-200 transition-all">월간 통계</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-sm text-slate-500 mb-1 font-semibold" id="admin-summary-title">전체 참여율 (일간)</p>
                        <div class="flex items-end gap-2">
                            <span class="text-4xl font-extrabold text-slate-900 tracking-tight" id="admin-total-percent">0.0%</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2.5 rounded-full mt-5 overflow-hidden">
                            <div id="admin-total-progress" class="bg-indigo-600 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                        </div>
                    </div>
                    <i data-lucide="percent" class="absolute -bottom-4 -right-4 w-32 h-32 text-slate-50 opacity-50 z-0"></i>
                </div>
                
                <div id="grade-summary-container" class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-slate-800">학년별 평균 참여율</h3>
                        <div class="flex gap-4 text-xs font-semibold text-slate-400">
                            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span> 1학년</span>
                            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-blue-400"></span> 2학년</span>
                            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span> 3학년</span>
                        </div>
                    </div>
                    <div class="flex items-end justify-between h-24 px-4 gap-8">
                        <div class="flex-1 flex flex-col items-center gap-2 group">
                            <span class="text-xs font-bold text-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity" id="label-g1">0%</span>
                            <div class="w-full bg-indigo-500 rounded-t-lg transition-all duration-1000 ease-out hover:bg-indigo-400" id="bar-g1" style="height: 0%"></div>
                            <span class="text-xs font-bold text-slate-600">1학년</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center gap-2 group">
                            <span class="text-xs font-bold text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity" id="label-g2">0%</span>
                            <div class="w-full bg-blue-400 rounded-t-lg transition-all duration-1000 ease-out hover:bg-blue-300" id="bar-g2" style="height: 0%"></div>
                            <span class="text-xs font-bold text-slate-600">2학년</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center gap-2 group">
                            <span class="text-xs font-bold text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity" id="label-g3">0%</span>
                            <div class="w-full bg-slate-400 rounded-t-lg transition-all duration-1000 ease-out hover:bg-slate-300" id="bar-g3" style="height: 0%"></div>
                            <span class="text-xs font-bold text-slate-600">3학년</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-slate-800" id="table-title">반별 상세 통계</h3>
                    <div class="text-sm font-semibold text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200">기입 진행: <span id="recorded-classes-count" class="text-indigo-600">0</span> / 20개 반</div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white text-slate-500 font-semibold border-b-2 border-slate-100">
                            <tr>
                                <th class="px-5 py-4 whitespace-nowrap">학급</th>
                                <th class="px-5 py-4 whitespace-nowrap">담임</th>
                                <th class="px-5 py-4 whitespace-nowrap">총원 <span id="table-head-total-info" class="text-[10px] font-normal text-slate-400 block">(일간)</span></th>
                                <th class="px-5 py-4 text-center whitespace-nowrap">1차시 누적</th>
                                <th class="px-5 py-4 text-center whitespace-nowrap">2차시 누적</th>
                                <th class="px-5 py-4 text-center whitespace-nowrap">3차시 누적</th>
                                <th class="px-5 py-4 text-center whitespace-nowrap">4차시(3학)</th>
                                <th class="px-5 py-4 text-right whitespace-nowrap">평균 참여율</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100">
                            <!-- Statistics rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        
        <!-- AI Briefing Modal Overlay -->
        <div id="ai-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-amber-50 to-orange-50">
                    <h3 class="font-bold text-amber-900 flex items-center gap-2 text-lg">
                        <i data-lucide="sparkles" class="w-5 h-5 text-amber-600"></i>
                        AI 일일 보고서 생성기
                    </h3>
                    <button onclick="closeAIModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="p-6 min-h-[160px] flex flex-col justify-center">
                    <div id="ai-content" class="text-slate-700 leading-relaxed text-[15px]">
                        <!-- Content injected here -->
                    </div>
                </div>
                <div class="px-6 py-4 bg-slate-50 flex justify-between items-center border-t border-slate-100">
                    <span class="text-xs font-semibold text-slate-400"><i data-lucide="bot" class="w-3 h-3 inline pb-0.5"></i> Powered by Gemini API</span>
                    <div class="flex gap-2">
                        <button onclick="copyAIText()" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50 transition-colors shadow-sm flex items-center gap-1">복사하기</button>
                        <button onclick="closeAIModal()" class="px-4 py-2 bg-slate-800 text-white text-sm font-bold rounded-lg hover:bg-slate-900 transition-colors shadow-sm">닫기</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module">

        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-study-attendance-v2';

        const apiKey = ""; // Gemini API Key injected by environment

        const classConfig = { 1: 6, 2: 7, 3: 7 };
        const totalClasses = Object.values(classConfig).reduce((a, b) => a + b, 0);

        let user = null;
        let currentView = 'teacher';
        let adminStatType = 'daily'; 
        let selectedGrade = null;
        let selectedClass = null;
        
        let currentDateStr = '';
        let currentMonthStr = '';
        let todayRealStr = ''; 
        
        let attendanceData = {}; 
        let allStudents = []; 
        let teachersData = {};
        
        let unsubAttendance = null;

        async function init() {
            lucide.createIcons();
            showLoading(true);

            const offset = new Date().getTimezoneOffset() * 60000;
            todayRealStr = (new Date(Date.now() - offset)).toISOString().slice(0, 10);

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) { console.error("Auth error", e); }
            };
            
            await initAuth();

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    subscribeToConfig();
                    subscribeToAttendance();
                }
            });

            allStudents = parseStudentCSV(defaultStudentText);
            teachersData = parseTeacherCSV(defaultTeacherText);

            switchView('teacher');
            showLoading(false);
        }

        // === Gemini API Fetch Utility with Exponential Backoff ===
        async function fetchGeminiAPI(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                    return await res.json();
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        // === Gemini AI Integration: Admin Briefing ===
        window.generateAIBriefing = async () => {
            const dateStr = document.getElementById('current-date-display').innerText;
            const overallPercent = document.getElementById('admin-total-percent').innerText;
            const g1Percent = document.getElementById('label-g1').innerText;
            const g2Percent = document.getElementById('label-g2').innerText;
            const g3Percent = document.getElementById('label-g3').innerText;

            const modal = document.getElementById('ai-modal');
            const contentBox = document.getElementById('ai-content');
            
            modal.classList.remove('hidden');
            contentBox.innerHTML = `
                <div class="flex flex-col items-center gap-3 text-amber-600 justify-center h-full">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                    <p class="font-bold text-sm">AI가 통계 데이터를 분석하여<br/>보고서를 작성하고 있습니다...</p>
                </div>`;
            lucide.createIcons();

            const prompt = `오늘(${dateStr}) 우리 학교의 야간 자율학습 참여 현황입니다.
- 전체 평균 참여율: ${overallPercent}
- 1학년 참여율: ${g1Percent}
- 2학년 참여율: ${g2Percent}
- 3학년 참여율: ${g3Percent}

위 통계 결과를 바탕으로 교장 선생님 및 교직원 단체 채팅방에 공유할 짧고 전문적이며 희망찬 '일일 보고용 브리핑(3~4문장)'을 한국어로 작성해주세요. 인사말, 주요 수치 언급, 격려의 마무리로 구성하고 적절한 이모지를 사용하세요.`;
            const systemInst = "당신은 고등학교의 스마트하고 긍정적인 행정 어시스턴트입니다. 정확한 수치를 바탕으로 간결하고 전문적으로 보고서를 작성합니다.";

            try {
                const result = await fetchGeminiAPI(prompt, systemInst);
                let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("No Content");
                
                text = text.replace(/\n/g, '<br/>');
                contentBox.innerHTML = `<div id="ai-text-result" class="p-2">${text}</div>`;
            } catch (e) {
                console.error("AI Briefing Error:", e);
                contentBox.innerHTML = `
                    <div class="flex flex-col items-center gap-2 text-rose-500">
                        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                        <p class="font-bold text-sm">브리핑 생성에 실패했습니다. 나중에 다시 시도해 주세요.</p>
                    </div>`;
                lucide.createIcons();
            }
        };

        window.closeAIModal = () => {
            document.getElementById('ai-modal').classList.add('hidden');
        };

        window.copyAIText = () => {
            const el = document.getElementById('ai-text-result');
            if (el) {
                // Br tags to new lines
                const text = el.innerText;
                const tempTextArea = document.createElement('textarea');
                tempTextArea.value = text;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand('copy');
                document.body.removeChild(tempTextArea);
                showToast("복사되었습니다!");
            }
        };

        // === Gemini AI Integration: Teacher Cheer Message ===
        window.generateCheerMessage = async () => {
            if (!selectedGrade || !selectedClass) {
                showToast("학년과 반을 먼저 선택해주세요.", "error");
                return;
            }

            const cheerBox = document.getElementById('ai-cheer-message');
            cheerBox.classList.remove('hidden');
            cheerBox.innerHTML = `
                <div class="flex items-center gap-2 text-indigo-500 font-semibold justify-center">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 생성 중...
                </div>`;
            lucide.createIcons();

            const prompt = `지금은 저녁 시간이며 우리 학교 ${selectedGrade}학년 ${selectedClass}반 학생들이 남아서 야간 자율학습을 하고 있습니다.
전자칠판에 띄워둘 짧고 재치있으며 따뜻한 응원 메시지(1~2문장)를 작성해주세요. 학생들의 피로를 날려줄 센스 있는 이모지를 꼭 포함해주세요.`;
            const systemInst = "당신은 학생들을 진심으로 아끼고 응원하는 따뜻한 고등학교 선생님입니다. 학생들의 눈높이에 맞는 유쾌한 문장으로 답변합니다.";

            try {
                const result = await fetchGeminiAPI(prompt, systemInst);
                let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("No Content");
                
                cheerBox.innerHTML = `
                    <div class="flex items-start gap-2">
                        <span class="text-xl">💬</span>
                        <div class="flex-1">
                            <p class="font-bold text-slate-800">${text}</p>
                            <p class="text-[10px] text-slate-400 mt-2 text-right">Powered by AI ✨</p>
                        </div>
                    </div>`;
            } catch (e) {
                console.error("AI Cheer Message Error:", e);
                cheerBox.innerHTML = '<span class="text-rose-500 font-semibold">응원 메시지를 불러오지 못했습니다.</span>';
            }
        };


        // === Custom Date Control Handling ===
        window.adjustDate = (unit, delta) => {
            const parts = currentDateStr.split('-');
            let y = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10) - 1; 
            let d = parseInt(parts[2], 10);
            
            let newDate = new Date(y, m, d);
            
            if (unit === 'day') newDate.setDate(d + delta);
            
            const newDateStr = newDate.getFullYear() + '-' + 
                String(newDate.getMonth() + 1).padStart(2, '0') + '-' + 
                String(newDate.getDate()).padStart(2, '0');
                
            if (newDateStr > todayRealStr) {
                showToast("미래 날짜로는 이동할 수 없습니다.", "error");
                return;
            }
            
            changeDate(newDateStr);
        };

        function setDateVariables(dateString) {
            currentDateStr = dateString;
            currentMonthStr = dateString.substring(0, 7); 
            
            const dateObj = new Date(dateString);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            // 날짜 텍스트 업데이트 
            const parts = dateString.split('-');
            document.getElementById('current-date-display').textContent = 
                `${parts[0]}. ${parts[1]}. ${parts[2]} (${days[dateObj.getDay()]})`;
            
            // 입력창과 동기화
            document.getElementById('date-selector').value = dateString;

            // 미래 방지 비활성화 처리 (+ 버튼)
            checkPlusButtons(dateString);

            // 과거 날짜 경고 및 오늘버튼 노출
            const warningEl = document.getElementById('date-warning');
            const btnToday = document.getElementById('btn-today');
            if (dateString !== todayRealStr) {
                warningEl.classList.remove('hidden');
                btnToday.classList.remove('hidden');
            } else {
                warningEl.classList.add('hidden');
                btnToday.classList.add('hidden');
            }
        }

        function checkPlusButtons(currentStr) {
            const parts = currentStr.split('-');
            let y = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10) - 1;
            let d = parseInt(parts[2], 10);

            let tDay = new Date(y, m, d + 1);
            toggleBtn('btn-day-plus', formatDate(tDay) <= todayRealStr);
        }

        function formatDate(dObj) {
            return dObj.getFullYear() + '-' + 
                String(dObj.getMonth() + 1).padStart(2, '0') + '-' + 
                String(dObj.getDate()).padStart(2, '0');
        }

        function toggleBtn(id, isEnabled) {
            const btn = document.getElementById(id);
            if (isEnabled) {
                btn.classList.remove('opacity-30', 'cursor-not-allowed');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-30', 'cursor-not-allowed');
                btn.disabled = true;
            }
        }

        window.changeDate = (newDateStr) => {
            if (!newDateStr) return;
            const previousMonth = currentMonthStr;
            setDateVariables(newDateStr);
            
            if (previousMonth !== currentMonthStr && user) {
                subscribeToAttendance();
            } else {
                refreshCurrentView();
            }
        };

        window.goToToday = () => {
            changeDate(todayRealStr);
            showToast("오늘 날짜로 이동했습니다.");
        };

                b.classList.toggle('border-indigo-600', g === selectedGrade);
            });
            document.querySelectorAll('.class-btn').forEach(b => {
                const c = parseInt(b.dataset.class);
                b.classList.toggle('bg-indigo-600', c === selectedClass);
                b.classList.toggle('text-white', c === selectedClass);
                b.classList.toggle('border-indigo-600', c === selectedClass);
            });
        }

        function resetStudentContainer() {
            document.getElementById('no-class-selected').classList.remove('hidden');
            document.getElementById('student-container').classList.add('hidden');
            document.getElementById('class-info-card').classList.add('hidden');
        }

        function renderStudents() {
            if (!selectedGrade || !selectedClass) return;
            document.getElementById('no-class-selected').classList.add('hidden');
            document.getElementById('student-container').classList.remove('hidden');
            document.getElementById('class-info-card').classList.remove('hidden');
            
            const teacherName = teachersData[`${selectedGrade}_${selectedClass}`] || '미배정';
            document.getElementById('selected-class-title').innerHTML = `${selectedGrade}학년 ${selectedClass}반 <span class="text-sm font-normal text-slate-500 ml-1">(담임: ${teacherName})</span>`;
            
            const maxPeriod = selectedGrade === 3 ? 4 : 3;
            document.getElementById('period-info-text').innerHTML = 
                `${selectedGrade}학년은 ${maxPeriod}차시까지 운영됩니다. <span class="ml-2 font-bold ${currentDateStr === todayRealStr ? 'text-indigo-600' : 'text-rose-600'}">(선택일자: ${currentDateStr})</span>`;

            const grid = document.getElementById('student-grid');
            grid.innerHTML = '';

            const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
            const docId = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
            const currentAttendance = attendanceData[docId] || {};

            if (students.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-slate-50 border border-slate-200 rounded-xl p-8 text-center text-slate-500 mt-2">
                        <i data-lucide="file-warning" class="w-12 h-12 mx-auto mb-3 text-slate-400"></i>
                        <p class="font-bold text-slate-700 mb-1">학생 데이터가 없습니다.</p>
                        <p class="text-sm">관리자 메뉴의 '기초 데이터 설정'에서 전체 <b>학생데이터.csv</b>를 업로드해주세요.</p>
                    </div>
                `;
                lucide.createIcons();
            }

            students.forEach(student => {
                const data = currentAttendance[student.id] || { p1: 0, p2: 0, p3: 0, p4: 0 };
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-100 rounded-xl p-2 px-3 shadow-sm flex items-center justify-between gap-2';
                
                let pButtons = '';
                for (let p = 1; p <= maxPeriod; p++) {
                    const status = data[`p${p}`];
                    const sClass = status === 1 ? 'status-present' : (status === 2 ? 'status-absent' : 'status-none');
                    const sText = status === 1 ? '출' : (status === 2 ? '결' : '-');
                    pButtons += `
                        <div class="flex flex-col items-center">
                            <span class="text-[10px] font-bold text-slate-400 tracking-tighter leading-none mb-1">${p}차</span>
                            <button onclick="toggleStatus('${student.id}', ${p})" class="w-9 h-9 rounded-lg border-2 font-bold text-sm flex items-center justify-center transition-all ${sClass}">${sText}</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex-1 leading-tight"><span class="text-[11px] text-slate-400 font-bold">${student.no}번</span><br><span class="text-base font-bold text-slate-800">${student.name}</span></div>
                    <div class="flex gap-1">${pButtons}</div>
                `;
                grid.appendChild(card);
            });
            updateClassSummary(students, currentAttendance);
        }

        function updateClassSummary(students, classData) {
            const maxPeriod = selectedGrade === 3 ? 4 : 3;
            const totalStudents = students.length;
            let pCounts = [0, 0, 0, 0];
            
            students.forEach(s => {
                const sData = classData[s.id] || {};
                for (let p = 1; p <= maxPeriod; p++) {
                    if (sData[`p${p}`] === 1) pCounts[p - 1]++;
                }
            });

            const container = document.getElementById('class-stats-container');
            if (container) {
                container.innerHTML = '';
                for (let p = 1; p <= maxPeriod; p++) {
                    const presentCount = pCounts[p - 1];
                    const percent = totalStudents > 0 ? Math.round((presentCount / totalStudents) * 100) : 0;
                    
                    const row = document.createElement('div');
                    row.className = 'text-sm text-indigo-800 flex justify-between items-center bg-white/60 px-3 py-2 rounded-lg border border-indigo-100/50 shadow-sm';
                    row.innerHTML = `
                        <span class="font-bold">${p}차시</span>
                        <span class="font-extrabold text-indigo-900">${presentCount} / ${totalStudents}명 <span class="text-xs text-indigo-600 font-semibold ml-1">(${percent}%)</span></span>
                    `;
                    container.appendChild(row);
                }
            }
        }

        window.toggleStatus = async (studentId, period) => {
            if (!user) return;
            const docId = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
            const collectionPath = `attendance_${currentMonthStr}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionPath, docId);
            
            const currentClassData = attendanceData[docId] || {};
            const sData = currentClassData[studentId] || { p1: 0, p2: 0, p3: 0, p4: 0 };
            
            const newStatus = (sData[`p${period}`] + 1) % 3;
            sData[`p${period}`] = newStatus;
            
            if (newStatus === 2) {
                const maxPeriod = selectedGrade === 3 ? 4 : 3;
                for (let nextP = period + 1; nextP <= maxPeriod; nextP++) {
                    sData[`p${nextP}`] = 2;
                }
            }

            currentClassData[studentId] = sData;
            
            attendanceData[docId] = currentClassData;
            renderStudents();

            try {
                await setDoc(docRef, { data: currentClassData }, { merge: true });
                showToast("기록됨");
            } catch (e) { showToast("저장 실패", "error"); }
        };

        function updateAdminStats() {
            const tableBody = document.getElementById('admin-table-body');
            tableBody.innerHTML = '';
            
            let totalP = [0, 0, 0, 0], totalT = [0, 0, 0, 0];
            let gradeStats = { 1: { p:0, t:0 }, 2: { p:0, t:0 }, 3: { p:0, t:0 } };
            let recordedCount = 0;

            const isMonthly = (adminStatType === 'monthly');

            for (let g = 1; g <= 3; g++) {
                const maxClass = classConfig[g];
                for (let c = 1; c <= maxClass; c++) {
                    const students = allStudents.filter(s => s.grade === g && s.class === c);
                    const maxP = g === 3 ? 4 : 3;
                    
                    let recordsToProcess = [];
                    
                    if (isMonthly) {
                        Object.keys(attendanceData).forEach(key => {
                            if (key.endsWith(`_${g}_${c}`)) {
                                recordsToProcess.push(attendanceData[key]);
                            }
                        });
                    } else {
                        const docId = `${currentDateStr}_${g}_${c}`;
                        if (attendanceData[docId]) {
                            recordsToProcess.push(attendanceData[docId]);
                        }
                    }

                    let pCounts = [0, 0, 0, 0];
                    let classTotalDenominator = 0; 

                    if (recordsToProcess.length > 0) recordedCount++;

                    recordsToProcess.forEach(classData => {
                        students.forEach(s => {
                            const sData = classData[s.id] || {};
                            for (let i = 0; i < maxP; i++) {
                                if (sData[`p${i+1}`] === 1) pCounts[i]++;
                            }
                        });
                        classTotalDenominator += students.length * maxP;
                    });

                    const classPresentNumerator = pCounts.reduce((a,b)=>a+b, 0);
                    const percent = classTotalDenominator > 0 ? (classPresentNumerator / classTotalDenominator * 100).toFixed(1) : "0.0";
                    const teacherName = teachersData[`${g}_${c}`] || '-';
                    const displayTotalStudents = isMonthly ? (students.length * recordsToProcess.length) : students.length;

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-50 cursor-pointer transition-colors';
                    row.onclick = () => { switchView('teacher'); setGrade(g); setClass(c); };
                    row.innerHTML = `
                        <td class="px-5 py-4 font-bold text-slate-800">${g}-${c}</td>
                        <td class="px-5 py-4 text-slate-600">${teacherName}</td>
                        <td class="px-5 py-4 text-slate-500 font-medium">${displayTotalStudents} <span class="text-xs font-normal">명</span></td>
                        <td class="px-5 py-4 text-center font-semibold text-slate-700">${pCounts[0]}</td>
                        <td class="px-5 py-4 text-center font-semibold text-slate-700">${pCounts[1]}</td>
                        <td class="px-5 py-4 text-center font-semibold text-slate-700">${pCounts[2]}</td>
                        <td class="px-5 py-4 text-center font-semibold ${g<3?'text-slate-300':'text-slate-700'}">${g===3?pCounts[3]:'-'}</td>
                        <td class="px-5 py-4 text-right font-bold text-indigo-600">${percent}%</td>
                    `;
                    tableBody.appendChild(row);

                    for(let i=0; i<maxP; i++) { 
                        totalP[i] += pCounts[i]; 
                    }
                    totalT[0] += displayTotalStudents; 
                    gradeStats[g].p += classPresentNumerator; 
                    gradeStats[g].t += classTotalDenominator;
                }
            }

            const grandP = Object.values(gradeStats).reduce((sum, g) => sum + g.p, 0);
            const grandT = Object.values(gradeStats).reduce((sum, g) => sum + g.t, 0);
            const overall = grandT > 0 ? (grandP / grandT * 100).toFixed(1) : 0;
            
            document.getElementById('admin-total-percent').textContent = `${overall}%`;
            document.getElementById('admin-total-progress').style.width = `${overall}%`;
            document.getElementById('recorded-classes-count').textContent = recordedCount;
            
            for(let g=1; g<=3; g++) {
                const p = gradeStats[g].t > 0 ? (gradeStats[g].p / gradeStats[g].t * 100) : 0;
                document.getElementById(`bar-g${g}`).style.height = `${p}%`;
                document.getElementById(`label-g${g}`).textContent = `${p.toFixed(1)}%`;
            }
        }

        // === Firebase Subscriptions ===
        function subscribeToConfig() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'config_v1'), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.students && data.students.length > 0) allStudents = data.students;
                    if (data.teachers && Object.keys(data.teachers).length > 0) teachersData = data.teachers;
                    refreshCurrentView();
                }
            }, (e) => console.error("Config FS Error", e));
        }

        function subscribeToAttendance() {
            if (unsubAttendance) {
                unsubAttendance();
            }
            
            const collectionPath = `attendance_${currentMonthStr}`;
            unsubAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', collectionPath), (s) => {
                attendanceData = {};
                s.forEach(doc => {
                    attendanceData[doc.id] = doc.data().data || {};
                });
                refreshCurrentView();
            }, (e) => console.error("FS Error", e));
        }

        // === Data Parsing Functions ===
        function parseStudentCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '');
            const lines = cleanText.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            const students = [];
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 2) {
                    const hakbun = parts[0].trim();
                    const name = parts[1].trim();
                    if (hakbun.length === 5 && !isNaN(hakbun)) {
                        const g = parseInt(hakbun.substring(0, 1));
                        const c = parseInt(hakbun.substring(1, 3));
                        const n = parseInt(hakbun.substring(3, 5));
                        students.push({ id: `${g}-${c}-${n}`, grade: g, class: c, no: n, name: name });
                    }
                }
            }
            return students;
        }

        function parseTeacherCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '');
            const lines = cleanText.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            const teachers = {};
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 3) {
                    const gMatch = parts[0].match(/\d+/);
                    const cMatch = parts[1].match(/\d+/);
                    const name = parts[2].trim();
                    if (gMatch && cMatch) {
                        teachers[`${parseInt(gMatch[0])}_${parseInt(cMatch[0])}`] = name;
                    }
                }
            }
            return teachers;
        }

        // === Excel Export ===
        window.exportToCSV = () => {
            const dateObj = new Date(currentDateStr);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = days[dateObj.getDay()];
            const formattedDate = `${dateObj.getFullYear()}. ${dateObj.getMonth() + 1}. ${dateObj.getDate()}. (${weekday})`;

            let gradeTotals = { 1: 0, 2: 0, 3: 0 };
            let classStats = { 1: {}, 2: {}, 3: {} };

            // 데이터 집계
            for (let g = 1; g <= 3; g++) {
                const maxClass = classConfig[g];
                for (let c = 1; c <= maxClass; c++) {
                    const students = allStudents.filter(s => s.grade === g && s.class === c);
                    const docId = `${currentDateStr}_${g}_${c}`;
                    const classData = attendanceData[docId] || {};
                    
                    let pCounts = [0, 0, 0, 0];
                    const maxP = g === 3 ? 4 : 3;

                    students.forEach(s => {
                        const sData = classData[s.id] || {};
                        for (let i = 0; i < maxP; i++) {
                            if (sData[`p${i+1}`] === 1) pCounts[i]++;
                        }
                    });

                    classStats[g][c] = {
                        total: students.length,
                        p1: pCounts[0],
                        p2: pCounts[1],
                        p3: pCounts[2],
                        p4: g === 3 ? pCounts[3] : "" 
                    };
                    gradeTotals[g] += students.length;
                }
            }

            let rows = [];
            rows.push(Array(19).fill("")); 
            
            let row2 = Array(19).fill("");
            row2[5] = `"배정고 자율학습 참여현황\n${formattedDate}"`;
            rows.push(row2); 
            
            rows.push(Array(19).fill("")); 
            
            let row4 = Array(19).fill("");
            row4[1] = `"1학년\n(총 ${gradeTotals[1]}명)"`;
            row4[7] = `"2학년\n(총 ${gradeTotals[2]}명)"`;
            row4[13] = `"3학년\n(총 ${gradeTotals[3]}명)"`;
            rows.push(row4); 

            rows.push(["", "반", "재적", "1차시", "2차시", "3차시", "4차시", "반", "재적", "1차시", "2차시", "3차시", "4차시", "반", "재적", "1차시", "2차시", "3차시", "4차시"]);

            for (let c = 1; c <= 7; c++) {
                let row = [""];
                for (let g = 1; g <= 3; g++) {
                    if (c <= classConfig[g]) {
                        const stats = classStats[g][c];
                        row.push(c, stats.total, stats.p1, stats.p2, stats.p3, stats.p4);
                    } else {
                        row.push("", "", "", "", "", "");
                    }
                }
                rows.push(row);
            }

            const csvContent = "\uFEFF" + rows.map(e => e.join(",")).join("\n");
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `자율학습_참여현황_${currentDateStr.replace(/-/g, '')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function showLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        function showToast(m, type = "success") {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = m;
            
            const iconContainer = document.getElementById('toast-icon-container');
            if (type === 'error') {
                iconContainer.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5 text-rose-400"></i>';
            } else {
                iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>';
            }
            lucide.createIcons();

            t.classList.remove('translate-y-20');
            setTimeout(() => t.classList.add('translate-y-20'), 2000);
        }

        window.onload = init;
    </script>
