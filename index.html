<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야자 대시보드</title>
    <!-- 구형 브라우저 및 전자칠판 호환성을 위해 표준 스타일시트 사용 -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            padding: 0;
        }
        
        /* 출석 상태 스타일 강제 적용 */
        .status-present { background-color: #dcfce7 !important; color: #166534 !important; border-color: #86efac !important; }
        .status-absent  { background-color: #fee2e2 !important; color: #991b1b !important; border-color: #fca5a5 !important; }
        .status-none    { background-color: #f1f5f9 !important; color: #64748b !important; border-color: #e2e8f0 !important; }
        
        button { cursor: pointer; user-select: none; touch-action: manipulation; }
        button:active { transform: scale(0.95); }
        
        .grid-container { display: grid; gap: 1rem; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-slate-900 bg-gray-50">
<div id="app" class="max-w-7xl mx-auto p-4 md:p-6 pb-20">

    <!-- Header -->
    <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
        <h1 class="text-2xl font-bold flex items-center gap-2 text-blue-700">
            <i data-lucide="calendar-check"></i>
            야자 대시보드
        </h1>

        <div class="flex flex-col md:flex-row items-center gap-4">
            <!-- 브라우저 호환성을 고려한 커스텀 날짜 선택기 -->
            <div class="flex items-center bg-gray-100 p-1.5 rounded-xl">
                <button data-action="adjust-date" data-val="-1" class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white text-gray-600 transition-colors">
                    <i data-lucide="chevron-left"></i>
                </button>
                
                <!-- 날짜 표시부: 투명한 input을 위에 덮어씌워 달력이 뜨도록 유도 -->
                <div class="relative flex items-center justify-center px-4 h-10 bg-white rounded-lg mx-1 shadow-sm border border-transparent hover:border-blue-400 transition-colors cursor-pointer overflow-hidden group">
                    <i data-lucide="calendar" class="w-4 h-4 text-blue-500 mr-2 group-hover:text-blue-600"></i>
                    <span id="current-date-display" class="font-bold text-gray-800">로딩 중...</span>
                    <input type="date" id="date-selector" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="날짜 선택">
                </div>

                <button id="btn-day-plus" data-action="adjust-date" data-val="1" class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white text-gray-600 transition-colors">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>

            <div class="flex items-center bg-gray-100 p-1.5 rounded-xl w-full md:w-auto">
                <button id="btn-teacher" data-action="switch-view" data-val="teacher" class="flex-1 px-4 py-2 rounded-lg font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap">교사용</button>
                <button id="btn-student" data-action="switch-view" data-val="student" class="flex-1 px-4 py-2 rounded-lg font-bold transition-all text-gray-500 whitespace-nowrap">학생용(시상)</button>
                <button id="btn-admin" data-action="switch-view" data-val="admin" class="flex-1 px-4 py-2 rounded-lg font-bold transition-all text-gray-500 whitespace-nowrap">관리자용</button>
            </div>
        </div>
    </header>

    <!-- VIEW: TEACHER -->
    <main id="view-teacher" class="space-y-6">
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-64 space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                    <p class="text-sm font-bold text-gray-500 mb-3 uppercase">학년</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button data-action="set-grade" data-val="1" class="grade-btn py-3 border rounded-xl font-bold">1</button>
                        <button data-action="set-grade" data-val="2" class="grade-btn py-3 border rounded-xl font-bold">2</button>
                        <button data-action="set-grade" data-val="3" class="grade-btn py-3 border rounded-xl font-bold">3</button>
                    </div>
                    <p class="text-sm font-bold text-gray-500 my-3 uppercase">반</p>
                    <div id="class-grid" class="grid grid-cols-4 gap-2"></div>
                </div>

                <div id="class-info-card" class="bg-blue-50 p-5 rounded-2xl border border-blue-100 hidden">
                    <h3 class="font-bold text-blue-900 mb-2" id="selected-class-title">반 정보</h3>
                    <div id="class-stats-container" class="space-y-2"></div>
                </div>
            </div>

            <div class="flex-1">
                <div id="no-class-selected" class="bg-white border-2 border-dashed border-gray-200 rounded-3xl h-64 flex flex-col items-center justify-center text-gray-400">
                    <p>학년과 반을 선택해 주세요.</p>
                </div>
                <div id="student-container" class="hidden">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center gap-2">
                            <select id="quick-period-select" class="p-2 border rounded-lg font-bold text-sm">
                                <option value="1">1차시</option><option value="2">2차시</option><option value="3">3차시</option><option value="4">4차시</option>
                            </select>
                            <button data-action="mark-all" data-status="1" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg font-bold text-sm">전원 출석</button>
                            <button data-action="mark-all" data-status="2" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg font-bold text-sm">전원 결석</button>
                        </div>
                        <button data-action="clear-all" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-bold text-sm">모두 지우기</button>
                    </div>
                    <div id="student-grid" class="grid-container"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- VIEW: STUDENT (AWARD) -->
    <main id="view-student" class="hidden space-y-6">
        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-64 space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                    <p class="text-sm font-bold text-gray-500 mb-3 uppercase">시상 회차</p>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button data-action="set-award-round" data-val="1" class="round-btn py-2 border rounded-xl font-bold bg-blue-600 text-white">1회차</button>
                        <button data-action="set-award-round" data-val="2" class="round-btn py-2 border rounded-xl font-bold bg-white text-gray-700">2회차</button>
                        <button data-action="set-award-round" data-val="3" class="round-btn py-2 border rounded-xl font-bold bg-white text-gray-700">3회차</button>
                        <button data-action="set-award-round" data-val="4" class="round-btn py-2 border rounded-xl font-bold bg-white text-gray-700">4회차</button>
                    </div>
                    <p class="text-sm font-bold text-gray-500 mb-3 uppercase">학년</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button data-action="set-grade" data-val="1" class="grade-btn py-3 border rounded-xl font-bold">1</button>
                        <button data-action="set-grade" data-val="2" class="grade-btn py-3 border rounded-xl font-bold">2</button>
                        <button data-action="set-grade" data-val="3" class="grade-btn py-3 border rounded-xl font-bold">3</button>
                    </div>
                    <p class="text-sm font-bold text-gray-500 my-3 uppercase">반</p>
                    <div id="award-class-grid" class="grid grid-cols-4 gap-2"></div>

            </div>

            <div class="flex-1">

                </div>
                <div id="award-container" class="hidden">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4 flex flex-wrap items-center justify-between gap-4">
                        <h2 class="text-xl font-black text-gray-800 flex items-center gap-2" id="award-title">

                        <div class="flex gap-2">

                                <i data-lucide="download" class="w-4 h-4"></i> 2학년 명단
                            </button>
                            <button data-action="export-award-grade" data-val="3" class="px-3 py-2 bg-green-600 text-white rounded-lg font-bold text-sm flex items-center gap-1 hover:bg-green-700 transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i> 3학년 명단

                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm overflow-x-auto">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-4">학번</th>
                                    <th class="p-4">이름</th>
                                    <th class="p-4 text-center">참석일</th>

                                </tr>
                            </thead>
                            <tbody id="award-table-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- VIEW: ADMIN -->

                <div>

                </div>
            </div>
            <div class="flex gap-2">
                <button data-action="export-excel-daily" class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold whitespace-nowrap">일별 통계</button>
                <button data-action="export-excel-monthly" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold whitespace-nowrap">월별 통계</button>
            </div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">반</th><th class="p-4">담임</th><th class="p-4 text-center">재적</th><th class="p-4 text-center">1차</th><th class="p-4 text-center">2차</th><th class="p-4 text-center">3차</th><th class="p-4 text-center">4차</th><th class="p-4 text-right">일간 참여율</th><th class="p-4 text-right text-indigo-600">월간 평균</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body" class="divide-y"></tbody>
            </table>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-32 transition-transform duration-300 z-50"></div>
</div>

const getTodayStr = () => {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};

const formatDate = (s) => {
    const d = new Date(s + 'T12:00:00');
    return s.replace(/-/g, '.') + ' (' + ['일','월','화','수','목','금','토'][d.getDay()] + ')';
};

const downloadXls = (html, filename) => {
    const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
};

const setupEvents = () => {
    document.body.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const { action, val, id, p, status } = btn.dataset;
        if (action === 'switch-view') {
            currentView = val;
            document.getElementById('view-teacher').classList.toggle('hidden', val !== 'teacher');
            document.getElementById('view-student').classList.toggle('hidden', val !== 'student');
            document.getElementById('view-admin').classList.toggle('hidden', val !== 'admin');
            
            const aCls = "flex-1 px-4 py-2 rounded-lg font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap";
            const iCls = "flex-1 px-4 py-2 rounded-lg font-bold transition-all text-gray-500 whitespace-nowrap";
            document.getElementById('btn-teacher').className = val === 'teacher' ? aCls : iCls;
            document.getElementById('btn-student').className = val === 'student' ? aCls : iCls;
            document.getElementById('btn-admin').className = val === 'admin' ? aCls : iCls;
            
            if (val === 'admin') updateAdmin(); 
            else if (val === 'student') {
                awardDataCache = {}; // 교사용 화면에서 방금 입력한 데이터를 즉시 반영하기 위해 캐시 초기화
                loadAndRenderAward();
            }
            else render();
        }
        if (action === 'set-award-round') { selectedAwardRound = parseInt(val); loadAndRenderAward(); }
        if (action === 'set-grade') { selectedGrade = parseInt(val); selectedClass = null; renderClasses(); updateUI(); if (currentView === 'student') loadAndRenderAward(); }
        if (action === 'set-class') { selectedClass = parseInt(val); updateUI(); if (currentView === 'student') loadAndRenderAward(); else render(); }
        if (action === 'adjust-date') { 
            const d = new Date(currentDateStr + 'T12:00:00');
            d.setDate(d.getDate() + parseInt(val));
            const next = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            if (next <= todayRealStr) changeDate(next);
        }
        if (action === 'toggle-status') toggleStatus(id, parseInt(p));
        if (action === 'mark-all') markAll(parseInt(status));
        if (action === 'clear-all') clearAll();
        if (action === 'export-excel-daily') exportDaily();
        if (action === 'export-excel-monthly') exportMonthly();
        if (action === 'export-award-grade') exportAwardGradeExcel(parseInt(val));
    });
};

const changeDate = (d) => {
    const prevMonth = currentMonthStr;
    currentDateStr = d;
    currentMonthStr = d.substring(0, 7);
    
    // 인풋 값 동기화
    const dateInput = document.getElementById('date-selector');
    if (dateInput) dateInput.value = d;
    
    // 명시적으로 표시 텍스트를 업데이트 (2026.04.16 (목) 형태로 아름답게 표시)
    const displayEl = document.getElementById('current-date-display');
    if (displayEl) displayEl.textContent = formatDate(d);
    
    const btnPlus = document.getElementById('btn-day-plus');
    if (btnPlus) {
        btnPlus.disabled = d >= todayRealStr;
        btnPlus.style.opacity = d >= todayRealStr ? '0.3' : '1';
    }

    if (user && (prevMonth !== currentMonthStr || !unsubAttendance)) {
        subscribe(); 
    } else {
        if (currentView === 'teacher') render();
        else if (currentView === 'admin') updateAdmin();
        else if (currentView === 'student') loadAndRenderAward();
    }
};

const render = () => {
    if (!selectedGrade || !selectedClass) return;
    const grid = document.getElementById('student-grid');
    if (!grid) return;
    
    const teacher = teachersData[`${selectedGrade}_${selectedClass}`] || '미배정';
    const titleEl = document.getElementById('selected-class-title');
    if (titleEl) titleEl.textContent = `${selectedGrade}학년 ${selectedClass}반 (담임: ${teacher})`;
    
    grid.innerHTML = '';
    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
    const data = attendanceData[`${currentDateStr}_${selectedGrade}_${selectedClass}`] || {};

    students.forEach(s => {
        const sData = data[s.id] || {p1:0, p2:0, p3:0, p4:0};
        const card = document.createElement('div');
        card.className = 'bg-white border p-4 rounded-2xl flex items-center justify-between shadow-sm';
        card.innerHTML = `
            <div class="flex flex-col">
                <span class="text-xs font-bold text-gray-400">${s.no}번</span>
                <span class="text-xl font-black text-gray-800">${s.name}</span>
            </div>
            <div class="flex gap-1">
                ${[1,2,3,4].map(p => {
                    const st = sData[`p${p}`];
                    const cls = st === 1 ? 'status-present' : st === 2 ? 'status-absent' : 'status-none';
                    return `<button data-action="toggle-status" data-id="${s.id}" data-p="${p}" class="w-10 h-10 rounded-lg border-2 font-bold text-sm ${cls}">${st===1?'출':st===2?'결':'-'}</button>`;
                }).join('')}
            </div>
        `;
        grid.appendChild(card);
    });
    updateSummary(students, data);
};

const toggleStatus = async (id, p) => {
    const key = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
    if (!attendanceData[key]) attendanceData[key] = {};
    const cur = attendanceData[key];
    if (!cur[id]) cur[id] = {p1:0,p2:0,p3:0,p4:0};
    
    const next = (cur[id][`p${p}`] + 1) % 3;
    cur[id][`p${p}`] = next;
    
    // 결석(2) 처리 시, 이후 차시는 자동 결석 처리
    if (next === 2) { 
        for (let i = p + 1; i <= 4; i++) cur[id][`p${i}`] = 2; 
    }
    
    // 출석(1) 처리 시, 4차시를 제외한(p<=3) 이전 차시는 '누르지 않은 상태(0)'일 때만 자동 출석 처리
    if (next === 1 && p <= 3) {
        for (let i = 1; i < p; i++) {
            if (cur[id][`p${i}`] === 0) {
                cur[id][`p${i}`] = 1;
            }
        }
    }
    
    render(); 
    await save(key, cur);
};

const markAll = async (status) => {
    const selectEl = document.getElementById('quick-period-select');
    if (!selectEl) return;
    const p = parseInt(selectEl.value);
    const key = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
    if (!attendanceData[key]) attendanceData[key] = {};
    const cur = attendanceData[key];
    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
    
    students.forEach(s => {
        if (!cur[s.id]) cur[s.id] = {p1:0,p2:0,p3:0,p4:0};
        cur[s.id][`p${p}`] = status;
        
        // 결석(2) 처리 시, 이후 차시는 자동 결석 처리
        if (status === 2) { 
            for (let i = p + 1; i <= 4; i++) cur[s.id][`p${i}`] = 2; 
        }
        
        // 출석(1) 처리 시, 4차시를 제외한(p<=3) 이전 차시는 '누르지 않은 상태(0)'일 때만 자동 출석 처리
        if (status === 1 && p <= 3) { 
            for (let i = 1; i < p; i++) {
                if (cur[s.id][`p${i}`] === 0) {
                    cur[s.id][`p${i}`] = 1;
                }
            }
        }
    });
    
    render(); 
    await save(key, cur);
};

const clearAll = async () => {
    if(!confirm("기록을 초기화하시겠습니까?")) return;
    const key = `${currentDateStr}_${selectedGrade}_${selectedClass}`;
    if (!attendanceData[key]) attendanceData[key] = {};
    const cur = attendanceData[key];
    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
    
    // 현재 선택된 반의 모든 학생 상태를 명시적으로 '미지정(0)'으로 덮어씌웁니다.
    students.forEach(s => {
        cur[s.id] = { p1: 0, p2: 0, p3: 0, p4: 0 };
    });
    
    render(); 
    await save(key, cur);
};

const updateSummary = (students, data) => {
    const container = document.getElementById('class-stats-container');
    if (!container) return;
    container.innerHTML = '';
    for (let p = 1; p <= 4; p++) {
        const present = students.filter(s => (data[s.id] || {})[`p${p}`] === 1).length;
        const per = students.length > 0 ? Math.round((present / students.length) * 100) : 0;
        container.innerHTML += `<div class="flex justify-between text-sm py-1 border-b border-blue-100/50 text-blue-800"><b>${p}차시</b> <span>${present}명 (${per}%)</span></div>`;
    }
};

const updateAdmin = () => {
    const body = document.getElementById('admin-table-body'); 
    if (!body) return;
    body.innerHTML = '';
    let tP = 0, tT = 0;
    let mP = 0, mT = 0;
    
    const monthlyStats = {};
    for (let g = 1; g <= 3; g++) {
        for (let c = 1; c <= CONFIG.classes[g]; c++) {
            monthlyStats[`${g}_${c}`] = { p: 0, s: 0 };
        }
    }
    const dates = [...new Set(Object.keys(attendanceData).map(k => k.split('_')[0]))].filter(d => d.startsWith(currentMonthStr));
    dates.forEach(d => {
        for (let g = 1; g <= 3; g++) {
            for (let c = 1; c <= CONFIG.classes[g]; c++) {
                const students = allStudents.filter(s => s.grade === g && s.class === c);
                const data = attendanceData[`${d}_${g}_${c}`] || {};
                let p = 0; for(let i=1;i<=4;i++) p += countPresent(data, students, i);
                monthlyStats[`${g}_${c}`].p += p;
                monthlyStats[`${g}_${c}`].s += students.length * 4;
                mP += p;
                mT += students.length * 4;
            }
        }
    });

    for (let g = 1; g <= 3; g++) {
        for (let c = 1; c <= CONFIG.classes[g]; c++) {
            const students = allStudents.filter(s => s.grade === g && s.class === c);
            if (!students.length) continue;
            
            const data = attendanceData[`${currentDateStr}_${g}_${c}`] || {};
            const pCounts = [0,0,0,0];
            students.forEach(s => { for (let i=0; i<4; i++) if(data[s.id]?.[`p${i+1}`] === 1) pCounts[i]++; });
            const pSum = pCounts.reduce((a,b)=>a+b, 0); const slots = students.length * 4;
            const per = slots > 0 ? (pSum/slots*100).toFixed(1) : '0.0';
            
            const mStats = monthlyStats[`${g}_${c}`];
            const mPer = mStats.s > 0 ? (mStats.p/mStats.s*100).toFixed(1) : '0.0';

            body.innerHTML += `<tr class="hover:bg-gray-50"><td class="p-4 font-bold">${g}-${c}</td><td class="p-4 text-gray-500">${teachersData[`${g}_${c}`]||'-'}</td><td class="p-4 text-center">${students.length}</td><td class="p-4 text-center">${pCounts[0]}</td><td class="p-4 text-center">${pCounts[1]}</td><td class="p-4 text-center">${pCounts[2]}</td><td class="p-4 text-center">${pCounts[3]}</td><td class="p-4 text-right font-black text-gray-800">${per}%</td><td class="p-4 text-right font-black text-indigo-600">${mPer}%</td></tr>`;
            tP += pSum; tT += slots;
        }
    }
    const totalEl = document.getElementById('admin-total-percent');
    if (totalEl) totalEl.textContent = tT > 0 ? (tP/tT*100).toFixed(1) + '%' : '0.0%';
    
    const monthEl = document.getElementById('admin-monthly-percent');
    if (monthEl) monthEl.textContent = mT > 0 ? (mP/mT*100).toFixed(1) + '%' : '0.0%';
};

// --- 엑셀 출력 ---
function countPresent(data, students, period) {
    return students.filter(s => (data[s.id]?.[`p${period}`] ?? 0) === 1).length;
}

const exportDaily = () => {
    const fd = currentDateStr.replace(/-/g, '.');
    const maxClass = Math.max(...Object.values(CONFIG.classes));
    const colsPerGrade = 7; // 재적, 1, 2, 3, 4, 참여율, 월평균
    const totalCols = 1 + CONFIG.maxGrade * colsPerGrade;
    
    // 월간 평균 미리 계산
    const monthlyStats = {};
    const dates = [...new Set(Object.keys(attendanceData).map(k => k.split('_')[0]))].filter(d => d.startsWith(currentMonthStr));
    for (let g = 1; g <= 3; g++) {
        for (let c = 1; c <= CONFIG.classes[g]; c++) {
            monthlyStats[`${g}_${c}`] = { p: 0, s: 0 };
        }
    }
    dates.forEach(d => {
        for (let g = 1; g <= 3; g++) {
            for (let c = 1; c <= CONFIG.classes[g]; c++) {
                const students = allStudents.filter(s => s.grade === g && s.class === c);
                const data = attendanceData[`${d}_${g}_${c}`] || {};
                let p = 0; for(let i=1;i<=4;i++) p += countPresent(data, students, i);
                monthlyStats[`${g}_${c}`].p += p;
                monthlyStats[`${g}_${c}`].s += students.length * 4;
            }
        }
    });

    let html = `<tr><td colspan="${totalCols}" style="font-size:14pt;font-weight:bold;text-align:center;height:40px;">야간 자율학습 일별 참여현황 (${fd})</td></tr>`;
    html += `<tr><td style="background:#f1f5f9;">반</td>`;
    for (let g = 1; g <= 3; g++) html += `<td colspan="${colsPerGrade}" style="background:#e0e7ff;text-align:center;font-weight:bold;">${g}학년</td>`;
    html += `</tr><tr style="text-align:center;font-weight:bold;background:#f1f5f9;"><td></td>`;
    for (let g = 1; g <= 3; g++) html += `<td>재적</td><td>1차</td><td>2차</td><td>3차</td><td>4차</td><td>일간 참여율</td><td style="color:#4f46e5;">월간 평균</td>`;
    html += `</tr>`;
    
    for (let c = 1; c <= maxClass; c++) {
        html += `<tr><td style="text-align:center;font-weight:bold;">${c}반</td>`;
        for (let g = 1; g <= 3; g++) {
            if (c <= CONFIG.classes[g]) {
                const students = allStudents.filter(s => s.grade === g && s.class === c);
                const data = attendanceData[`${currentDateStr}_${g}_${c}`] || {};
                const counts = [1,2,3,4].map(p => countPresent(data, students, p));
                const sum = counts.reduce((a,b)=>a+b,0); const slots = students.length*4;
                
                const mStats = monthlyStats[`${g}_${c}`];
                const mAvg = mStats && mStats.s > 0 ? (mStats.p / mStats.s * 100).toFixed(1) + '%' : '-';

                html += `<td style="text-align:center;">${students.length}</td>` + counts.map(n=>`<td style="text-align:center;">${n}</td>`).join('') + `<td style="text-align:center;font-weight:bold;">${slots>0?(sum/slots*100).toFixed(1)+'%':'-'}</td><td style="text-align:center;font-weight:bold;color:#4f46e5;">${mAvg}</td>`;
            } else html += `<td colspan="${colsPerGrade}"></td>`;
        }
        html += `</tr>`;
    }
    downloadXls(`<html><head><meta charset='utf-8'><style>${XL_STYLE}</style></head><body><table border="1" style="border-collapse:collapse;">${html}</table></body></html>`, `야자_일별_${currentDateStr}.xls`);
};

const exportMonthly = () => {
    const dates = [...new Set(Object.keys(attendanceData).map(k => k.split('_')[0]))].filter(d => d.startsWith(currentMonthStr)).sort();
    if (dates.length === 0) dates.push(currentDateStr);
    const classList = [];
    for (let g = 1; g <= 3; g++) for (let c = 1; c <= CONFIG.classes[g]; c++) classList.push({ g, c });
    const totalCols = 1 + classList.length + 1;
    
    let html = `<tr><td colspan="${totalCols}" style="font-size:14pt;font-weight:bold;text-align:center;height:40px;">월별 참여현황 (${currentMonthStr})</td></tr>`;
    html += `<tr style="background:#f1f5f9;font-weight:bold;text-align:center;"><td>날짜</td>` + classList.map(item => `<td style="mso-number-format:'\\@';">${item.g}-${item.c}반</td>`).join('') + `<td>일별 평균</td></tr>`;
    
    const classTotals = classList.map(() => ({ p: 0, s: 0 }));
    let grandP = 0, grandS = 0;

    dates.forEach(d => {
        const dayStr = d.split('-').length > 2 ? d.split('-')[2] + '일' : d;
        html += `<tr><td style="text-align:center;font-weight:bold;">${dayStr}</td>`;
        let dSum = 0, dSlots = 0;
        classList.forEach(({g,c}, index) => {
            const students = allStudents.filter(s => s.grade === g && s.class === c);
            const data = attendanceData[`${d}_${g}_${c}`] || {};
            let p = 0; for(let i=1;i<=4;i++) p += countPresent(data, students, i);
            const s = students.length*4;
            html += `<td style="text-align:center;">${p}/${s}</td>`; 
            dSum += p; 
            dSlots += s;
            classTotals[index].p += p;
            classTotals[index].s += s;
        });
        html += `<td style="text-align:center;font-weight:bold;color:#4f46e5;background:#fef9c3;">${dSlots>0?(dSum/dSlots*100).toFixed(1)+'%':'-'}</td></tr>`;
        grandP += dSum;
        grandS += dSlots;
    });

    // 맨 아래 반별 월평균 행 추가
    html += `<tr style="background:#e0e7ff;font-weight:bold;text-align:center;"><td>월평균</td>`;
    classTotals.forEach(total => {
        const avg = total.s > 0 ? (total.p / total.s * 100).toFixed(1) + '%' : '-';
        html += `<td style="color:#4f46e5;">${avg}</td>`;
    });
    const grandAvg = grandS > 0 ? (grandP / grandS * 100).toFixed(1) + '%' : '-';
    html += `<td style="color:#4f46e5;background:#fef9c3;">${grandAvg}</td></tr>`;

    downloadXls(`<html><head><meta charset='utf-8'><style>${XL_STYLE}</style></head><body><table border="1" style="border-collapse:collapse;">${html}</table></body></html>`, `야자_월별_${currentMonthStr}.xls`);
};

// --- DB ---
const save = async (docId, data) => {
    if (!db || !user) return;
    try { await setDoc(doc(db, 'artifacts', CONFIG.appId, 'public', 'data', `attendance_${currentMonthStr}`, docId), { data: data }, { merge: true }); } catch (e) {}
};

const subscribe = () => {
    if (!db || !user) return;
    if (unsubAttendance) unsubAttendance();
    
    attendanceData = {};
    
    const colRef = collection(db, 'artifacts', CONFIG.appId, 'public', 'data', `attendance_${currentMonthStr}`);
    unsubAttendance = onSnapshot(colRef, snap => {
        const newData = {};
        snap.forEach(d => { newData[d.id] = d.data().data || {}; });
        attendanceData = newData;
        if (currentView === 'teacher') render(); 
        else if (currentView === 'admin') updateAdmin();
        else if (currentView === 'student') loadAndRenderAward();
    }, (err) => {
        console.warn("DB 에러:", err);
    });
};

// --- PARSERS ---
function parseStudents(t) {
    return t.trim().split('\n').slice(1).map(l => {
        const p = l.split(','); if (p.length < 2) return null;
        const id = p[0].trim(); return { id, grade: parseInt(id[0]), class: parseInt(id.substring(1,3)), no: parseInt(id.substring(3,5)), name: p[1].trim() };
    }).filter(Boolean);
}

function parseTeachers(t) {
    const obj = {};
    t.trim().split('\n').slice(1).forEach(l => {
        const p = l.split(','); const gM = p[0].match(/\d+/), cM = p[1].match(/\d+/);
        if (gM && cM) obj[`${parseInt(gM[0])}_${parseInt(cM[0])}`] = p[2].trim();
    });
    return obj;
}

// --- AWARD & STUDENT DASHBOARD LOGIC ---
const getRounds = (year) => ({
    1: { name: '1회차', start: `${year}-03-09`, end: `${year}-04-24`, target: 26 },
    2: { name: '2회차', start: `${year}-05-01`, end: `${year}-07-15`, target: 36 },
    3: { name: '3회차', start: `${year}-08-18`, end: `${year}-10-08`, target: 26 },
    4: { name: '4회차', start: `${year}-10-16`, end: `${year}-12-28`, target: 32 }
});

let selectedAwardRound = 1;
let awardDataCache = {};

async function loadAndRenderAward() {
    document.querySelectorAll('.round-btn').forEach(b => {
        const active = parseInt(b.dataset.val) === selectedAwardRound;
        b.className = `round-btn py-2 border rounded-xl font-bold transition-all ${active ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'}`;
    });

    if (!selectedGrade || !selectedClass) {
        document.getElementById('no-award-class-selected').classList.remove('hidden');
        document.getElementById('award-container').classList.add('hidden');
        return;
    }
    document.getElementById('no-award-class-selected').classList.add('hidden');
    document.getElementById('award-container').classList.remove('hidden');

    const year = currentDateStr.substring(0, 4) || new Date().getFullYear();
    const rounds = getRounds(year);
    const round = rounds[selectedAwardRound];
    
    document.getElementById('award-title').innerHTML = `<i data-lucide="award" class="text-yellow-500"></i> ${round.name} 시상 현황 (${selectedGrade}학년 ${selectedClass}반)`;
    document.getElementById('award-target-days').textContent = round.target;
    if (window.lucide) lucide.createIcons();
    
    const cacheKey = `${year}_${selectedAwardRound}`;
    if (!awardDataCache[cacheKey]) {
        showToast("시상 데이터를 불러오는 중입니다...");
        awardDataCache[cacheKey] = await fetchAwardData(round);
    }
    
    renderAwardTable(awardDataCache[cacheKey], round);
}

async function fetchAwardData(round) {
    let compiled = {};
    if (db) {
        const startMonth = round.start.substring(0, 7);
        const endMonth = round.end.substring(0, 7);
        
        const months = [];
        let cur = new Date(`${startMonth}-01T12:00:00`);
        const end = new Date(`${endMonth}-01T12:00:00`);
        while (cur <= end) {
            months.push(cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0'));
            cur.setMonth(cur.getMonth() + 1);
        }

        for (const m of months) {
            try {
                const snap = await getDocs(collection(db, 'artifacts', CONFIG.appId, 'public', 'data', `attendance_${m}`));
                snap.forEach(d => { compiled[d.id] = d.data().data || {}; });
            } catch(e) { console.warn("Failed to fetch award data", m, e); }
        }
    }
    
    // DB 동기화 지연이나 권한 제한 상황을 대비하여, 
    // 현재 화면에서 실시간으로 다루고 있는 로컬 출석 데이터를 결과에 덮어씌워 강제 병합합니다.
    Object.keys(attendanceData).forEach(docId => {
        compiled[docId] = attendanceData[docId];
    });

    return compiled;
}

function calculateValidDays(student, compiledData, round) {
    let validDays = 0;
    Object.keys(compiledData).forEach(docId => {
        const [dStr, gStr, cStr] = docId.split('_');
        if (parseInt(gStr) !== student.grade || parseInt(cStr) !== student.class) return;
        if (dStr < round.start || dStr > round.end) return;
        
        const stData = compiledData[docId][student.id];
        if (stData) {
            let pCount = (stData.p1===1?1:0) + (stData.p2===1?1:0) + (stData.p3===1?1:0) + (stData.p4===1?1:0);
            // 공통 조건: 일일 3차시 이상 / 3학년은 4차시(22시) 필수 반영
            const isValid = pCount >= 3 && (student.grade < 3 || stData.p4 === 1);
            if (isValid) validDays++;
        }
    });
    return validDays;
}

function renderAwardTable(compiledData, round) {
    const tbody = document.getElementById('award-table-body');
    tbody.innerHTML = '';
    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);
    
    students.forEach(s => {
        const validDays = calculateValidDays(s, compiledData, round);
        const per = Math.min(100, Math.round((validDays / round.target) * 100));
        const isWinner = validDays >= round.target;
        const remaining = round.target - validDays;
        
        const statusHtml = isWinner 
            ? `<span class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-full font-bold inline-flex items-center gap-1"><i data-lucide="trophy" class="w-4 h-4"></i> 시상 대상자</span>`
            : `<span class="text-gray-500 font-bold">${remaining}일 남음</span>`;
            
        const barColor = isWinner ? 'bg-yellow-400' : 'bg-blue-600';
        
        tbody.innerHTML += `
            <tr class="hover:bg-gray-50 transition-colors">
                <td class="p-4 font-bold text-gray-500">${s.id}</td>
                <td class="p-4 font-black text-gray-900">${s.name}</td>
                <td class="p-4 text-center font-bold text-blue-600">${validDays}일</td>
                <td class="p-4">
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="${barColor} h-3 rounded-full transition-all duration-700" style="width: ${per}%"></div>
                    </div>
                </td>
                <td class="p-4 text-right whitespace-nowrap">${statusHtml}</td>
            </tr>
        `;
    });
    if (window.lucide) lucide.createIcons();
}

async function exportAwardGradeExcel(grade) {
    const year = currentDateStr.substring(0, 4) || new Date().getFullYear();
    const round = getRounds(year)[selectedAwardRound];
    const cacheKey = `${year}_${selectedAwardRound}`;
    
    if (!awardDataCache[cacheKey]) {
        showToast("시상 데이터를 불러오는 중입니다...");
        awardDataCache[cacheKey] = await fetchAwardData(round);
    }
    const compiledData = awardDataCache[cacheKey] || {};
    
    const gradeStudents = allStudents.filter(s => s.grade === grade);
    let winners = [];
    
    gradeStudents.forEach(s => {
        const validDays = calculateValidDays(s, compiledData, round);
        if (validDays >= round.target) {
            winners.push({
                '학년': s.grade,
                '반': s.class,
                '번호': s.no,
                '학번': s.id,
                '이름': s.name,
                '총 참석일수': validDays,
                '상태': '🏆 시상 대상자'
            });
        }
    });

    // 반, 번호 순으로 정렬
    winners.sort((a, b) => {
        if (a['반'] !== b['반']) return a['반'] - b['반'];
        return a['번호'] - b['번호'];
    });

    if (winners.length === 0) {
        return showToast(`${grade}학년 시상 대상자가 아직 없습니다.`);
    }
    
    // SheetJS를 이용한 .xlsx 파일 추출 로직
    const ws = XLSX.utils.json_to_sheet(winners);
    ws['!cols'] = [{wch: 6}, {wch: 6}, {wch: 6}, {wch: 10}, {wch: 10}, {wch: 15}, {wch: 20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `${grade}학년 시상자명단`);
    XLSX.writeFile(wb, `[${round.name}_시상자명단_${grade}학년].xlsx`);
}

const showToast = (m) => {
    const t = document.getElementById('toast'); if(!t) return;
    t.textContent = m; t.classList.remove('translate-y-32');
    setTimeout(() => t.classList.add('translate-y-32'), 2500);
};

init();
</script>
