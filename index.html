<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고교 야간 자율학습 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .touch-target { min-height: 48px; min-width: 48px; }
        .status-present { background-color: #dcfce7; color: #166534; border-color: #86efac; }
        .status-absent  { background-color: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .status-none    { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        button:active { transform: scale(0.95); }
        .no-scale:active { transform: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 relative">
<div id="app" class="max-w-7xl mx-auto p-4 md:p-6 pb-20">

    <!-- Header -->
    <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-4 mb-6 bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2 text-indigo-700 shrink-0">
            <i data-lucide="calendar-check"></i>
            야간 자율학습
        </h1>

        <div class="flex flex-col md:flex-row items-center justify-between xl:justify-end w-full gap-4">
            <div class="flex items-center w-full md:w-auto justify-between md:justify-start">
                <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0">
                    <button data-action="adjust-date" data-val="-1"
                        class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all">
                        <i data-lucide="chevron-left" class="pointer-events-none"></i>
                    </button>
                    <div class="relative flex items-center justify-center px-2 md:px-4 h-10 hover:bg-white hover:shadow-sm rounded-lg transition-all cursor-pointer">
                        <input type="date" id="date-selector" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <span id="current-date-display" class="text-sm md:text-base font-bold text-slate-800 pointer-events-none whitespace-nowrap">로딩 중...</span>
                    </div>
                    <button id="btn-day-plus" data-action="adjust-date" data-val="1"
                        class="no-scale w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-600 transition-all">
                        <i data-lucide="chevron-right" class="pointer-events-none"></i>
                    </button>
                </div>
                <div class="flex items-center gap-2 ml-3">
                    <button id="btn-today" data-action="go-today"
                        class="hidden no-scale px-3 py-2 bg-indigo-50 text-indigo-600 border border-indigo-100 text-sm font-bold rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1.5">오늘</button>
                    <span id="date-warning"
                        class="hidden px-2.5 py-2 bg-rose-50 text-rose-600 border border-rose-100 text-xs font-bold rounded-lg flex items-center gap-1 animate-pulse whitespace-nowrap">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 과거 데이터
                    </span>
                </div>
            </div>

            <div class="flex items-center bg-slate-100 p-1.5 rounded-xl shrink-0 w-full md:w-auto">
                <button id="btn-teacher" data-action="switch-view" data-val="teacher"
                    class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all bg-white shadow-sm text-indigo-600">교사(출석체크)</button>
                <button id="btn-admin" data-action="switch-view" data-val="admin"
                    class="no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all text-slate-500 hover:bg-slate-200">관리자(통계)</button>
            </div>
        </div>
    </header>

    <!-- VIEW: TEACHER -->
    <main id="view-teacher" class="animate-in fade-in duration-500">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <label class="block text-sm font-bold text-slate-700 mb-3">반 선택</label>
                    <div class="space-y-4">
                        <div>
                            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">학년</span>
                            <div class="grid grid-cols-3 gap-2 mt-2">
                                <button data-action="set-grade" data-val="1" class="grade-btn px-3 py-2.5 border rounded-xl font-bold transition-all">1</button>
                                <button data-action="set-grade" data-val="2" class="grade-btn px-3 py-2.5 border rounded-xl font-bold transition-all">2</button>
                                <button data-action="set-grade" data-val="3" class="grade-btn px-3 py-2.5 border rounded-xl font-bold transition-all">3</button>
                            </div>
                        </div>
                        <div>
                            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">반</span>
                            <div id="class-grid" class="grid grid-cols-4 gap-2 mt-2"></div>
                        </div>
                    </div>
                </div>

                <div id="class-info-card" class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 hidden">
                    <h3 class="font-bold text-indigo-900 mb-3" id="selected-class-title">학년 반</h3>
                    <div id="class-stats-container" class="space-y-2 mb-4"></div>
                    <div class="pt-4 border-t border-indigo-100/50">
                        <button data-action="generate-cheer"
                            class="w-full px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white rounded-lg text-sm font-bold transition-all shadow-sm flex items-center justify-center gap-2">
                            <i data-lucide="sparkles" class="pointer-events-none w-4 h-4"></i> AI 학생 응원 생성 ✨
                        </button>
                        <div id="ai-cheer-message" class="hidden mt-3 p-3 bg-white/80 backdrop-blur-sm rounded-xl text-sm leading-relaxed text-indigo-900 border border-indigo-100 shadow-sm"></div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-3 space-y-4">
                <div id="no-class-selected"
                    class="bg-white border-2 border-dashed border-slate-200 rounded-2xl h-96 flex flex-col items-center justify-center text-slate-400">
                    <i data-lucide="mouse-pointer-2" class="w-12 h-12 mb-2"></i>
                    <p>학년과 반을 선택해주세요.</p>
                </div>

                <div id="student-container" class="hidden">
                    <!-- 일괄 처리 패널 -->
                    <div class="bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 mb-4 flex flex-row flex-wrap items-center justify-between gap-3">
                        <div class="flex items-center gap-2 w-full sm:w-auto">
                            <i data-lucide="zap" class="w-4 h-4 text-amber-500 hidden sm:block"></i>
                            <select id="quick-period-select"
                                class="px-2 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none flex-1 sm:flex-none">
                                <option value="1">1차시</option>
                                <option value="2">2차시</option>
                                <option value="3">3차시</option>
                                <option value="4">4차시</option>
                            </select>
                            <button data-action="mark-all" data-status="1"
                                class="px-3 py-1.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-lg border border-emerald-100 text-xs font-bold transition-colors whitespace-nowrap">전원 출석</button>
                            <button data-action="mark-all" data-status="2"
                                class="px-3 py-1.5 bg-rose-50 text-rose-700 hover:bg-rose-100 rounded-lg border border-rose-100 text-xs font-bold transition-colors whitespace-nowrap">전원 결석</button>
                        </div>
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                            <span class="text-[10px] text-slate-400 font-semibold bg-slate-50 px-2 py-1 rounded-md border border-slate-100 whitespace-nowrap hidden lg:block">터치: - → 출 → 결</span>
                            <button data-action="clear-all"
                                class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1 shadow-sm no-scale whitespace-nowrap flex-1 sm:flex-none">
                                <i data-lucide="rotate-ccw" class="pointer-events-none w-3.5 h-3.5"></i> 모두 지우기
                            </button>
                        </div>
                    </div>

                    <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- VIEW: ADMIN -->
    <main id="view-admin" class="hidden animate-in fade-in duration-500">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-sm text-slate-500 mb-1 font-semibold">전체 참여율 (일간)</p>
                <span class="text-4xl font-extrabold text-slate-900 tracking-tight" id="admin-total-percent">0.0%</span>
            </div>
            <div class="flex gap-2">
                <button data-action="generate-briefing"
                    class="no-scale px-5 py-3 bg-amber-50 text-amber-700 border border-amber-100 rounded-xl font-bold flex items-center gap-2">
                    <i data-lucide="sparkles" class="pointer-events-none w-5 h-5 text-amber-500"></i> AI 브리핑 ✨
                </button>
                <button data-action="export-excel"
                    class="no-scale px-6 py-3 bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-xl font-bold flex items-center gap-2">
                    <i data-lucide="file-spreadsheet" class="pointer-events-none w-5 h-5"></i> 엑셀 다운로드
                </button>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50 font-bold">반별 상세 통계 (4차시 기준)</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white text-slate-500 border-b">
                        <tr>
                            <th class="px-5 py-4">학급</th>
                            <th class="px-5 py-4">담임</th>
                            <th class="px-5 py-4">재적</th>
                            <th class="px-5 py-4 text-center">1차시</th>
                            <th class="px-5 py-4 text-center">2차시</th>
                            <th class="px-5 py-4 text-center">3차시</th>
                            <th class="px-5 py-4 text-center">4차시</th>
                            <th class="px-5 py-4 text-right">참여율</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- AI Modal -->
    <div id="ai-modal"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-indigo-50 to-purple-50">
                <h3 class="font-bold text-indigo-900 flex items-center gap-2 text-lg">
                    <i data-lucide="bot" class="w-6 h-6"></i> AI 보고용 브리핑
                </h3>
                <button data-action="close-modal" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="pointer-events-none w-6 h-6"></i>
                </button>
            </div>
            <div class="p-8 min-h-[200px] text-slate-700 leading-relaxed whitespace-pre-wrap" id="ai-content"></div>
            <div class="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
                <button data-action="copy-text" class="px-5 py-2.5 bg-white border text-sm font-bold rounded-xl hover:bg-slate-50 shadow-sm">복사하기</button>
                <button data-action="close-modal" class="px-5 py-2.5 bg-slate-900 text-white text-sm font-bold rounded-xl">닫기</button>
            </div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3.5 rounded-2xl shadow-2xl transform translate-y-32 transition-transform duration-300 z-50 flex items-center gap-3 pointer-events-none"></div>
</div>

// ── 유틸 ─────────────────────────────────────────────────────────────────────

/** [버그수정] 타임존 안전한 오늘 날짜 — UTC 기준 new Date()는 한국에서 날짜 밀림 발생 */
function getTodayLocalStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/** [버그수정] 날짜 문자열 덧셈 — 'T12:00:00' 정오를 붙여 DST 경계 문제 회피 */
function addDays(dateStr, delta) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateDisplay(dateStr) {
    const days = ['일','월','화','수','목','금','토'];
    const d = new Date(dateStr + 'T12:00:00');
    return `${dateStr.replace(/-/g,'.')} (${days[d.getDay()]})`;
}

function makeDocId() {
    return `${currentDateStr}_${selectedGrade}_${selectedClass}`;
}

/**
 * 버튼 상태 클래스 + 텍스트를 한 곳에서 적용 — markAll/toggle/clear 모두 이 함수 사용.
 * [버그수정] 원본에서 markAll이 DOM을 직접 조작할 때 클래스 문자열을 매번 하드코딩해
 *           일부 버튼에서 클래스 불일치가 발생하던 문제 해결.
 */
function applyBtnStatus(btn, status) {
    btn.classList.remove('status-present','status-absent','status-none');
    if (status === 1) {
        btn.classList.add('status-present');
        btn.textContent = '출';
    } else if (status === 2) {
        btn.classList.add('status-absent');
        btn.textContent = '결';
    } else {
        btn.classList.add('status-none');
        btn.textContent = '-';
    }
}

// ── 초기화 ───────────────────────────────────────────────────────────────────
async function init() {
    todayRealStr = getTodayLocalStr();
    allStudents  = parseStudentCSV(defaultStudentText);
    teachersData = parseTeacherCSV(defaultTeacherText);

    setDateVariables(todayRealStr);
    switchView('teacher');
    setupEventDelegation();

    if (typeof lucide !== 'undefined') lucide.createIcons();

    // [버그수정] 원본에서 date-selector change 이벤트를 setupEventDelegation과 별도로
    //           init에서 다시 addEventListener로 붙여 이중 등록될 수 있었음 → 위임으로 통합
    document.getElementById('date-selector').addEventListener('change', (e) => {
        changeDate(e.target.value);
    });

    try {
        if (typeof __firebase_config !== 'undefined') {
            const cfg = JSON.parse(__firebase_config);
            const appInstance = initializeApp(cfg);
            auth = getAuth(appInstance);
            db   = getFirestore(appInstance);
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, u => { user = u; if (user) subscribeToAttendance(); });
        }
    } catch (e) { console.warn("Offline Mode"); }
}

// ── 이벤트 위임 ──────────────────────────────────────────────────────────────
function setupEventDelegation() {
    document.body.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;

        if      (action === 'switch-view')      switchView(btn.dataset.val);
        else if (action === 'set-grade')        setGrade(parseInt(btn.dataset.val));
        else if (action === 'set-class')        setClass(parseInt(btn.dataset.val));
        else if (action === 'adjust-date')      adjustDate(parseInt(btn.dataset.val));
        else if (action === 'go-today')         changeDate(todayRealStr);
        else if (action === 'clear-all')        clearAllAttendance();
        else if (action === 'mark-all')         markAll(parseInt(btn.dataset.status));
        else if (action === 'export-excel')     exportToExcel();
        else if (action === 'generate-cheer')   generateCheerMessage();
        else if (action === 'generate-briefing')generateAIBriefing();
        else if (action === 'close-modal')      closeAIModal();
        else if (action === 'copy-text')        copyAIText();
        else if (action === 'toggle-status')    handleToggleStatus(btn.dataset.id, parseInt(btn.dataset.p));
    });
}

// ── 뷰 전환 ──────────────────────────────────────────────────────────────────
function switchView(view) {
    currentView = view;
    const base = 'no-scale flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm md:text-base font-semibold transition-all';
    document.getElementById('view-teacher').classList.toggle('hidden', view !== 'teacher');
    document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
    document.getElementById('btn-teacher').className = `${base} ${view==='teacher' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:bg-slate-200'}`;
    document.getElementById('btn-admin').className   = `${base} ${view==='admin'   ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:bg-slate-200'}`;
    if (view === 'admin') updateAdminStats(); else renderStudents();
}

// ── 반 선택 ──────────────────────────────────────────────────────────────────
function setGrade(g) {
    selectedGrade = g; selectedClass = null;
    renderClassButtons(); updateUI();
}

function setClass(c) {
    selectedClass = c; updateUI(); renderStudents();
}

function renderClassButtons() {
    const container = document.getElementById('class-grid');
    container.innerHTML = '';
    const count = CONFIG.classes[selectedGrade] || 0;
    for (let i = 1; i <= count; i++) {
        const btn = document.createElement('button');
        btn.className = 'class-btn px-2 py-3 border rounded-xl font-bold md:text-lg transition-all hover:bg-slate-50';
        btn.textContent = `${i}반`;
        btn.setAttribute('data-action', 'set-class');
        btn.setAttribute('data-val', i);
        container.appendChild(btn);
    }
}

function updateUI() {
    document.querySelectorAll('.grade-btn').forEach(b => {
        const active = parseInt(b.dataset.val) === selectedGrade;
        b.classList.toggle('bg-indigo-600', active);
        b.classList.toggle('text-white', active);
    });
    document.querySelectorAll('.class-btn').forEach((b, i) => {
        const active = (i + 1) === selectedClass;
        b.classList.toggle('bg-indigo-600', active);
        b.classList.toggle('text-white', active);
    });
    const hasClass = !!selectedClass;
    document.getElementById('no-class-selected').classList.toggle('hidden', hasClass);
    document.getElementById('student-container').classList.toggle('hidden', !hasClass);
    document.getElementById('class-info-card').classList.toggle('hidden', !hasClass);
}

// ── 날짜 ─────────────────────────────────────────────────────────────────────
function setDateVariables(dateStr) {
    currentDateStr  = dateStr;
    currentMonthStr = dateStr.substring(0, 7);
    document.getElementById('current-date-display').textContent = formatDateDisplay(dateStr);
    document.getElementById('date-selector').value = dateStr;

    const isToday = dateStr === todayRealStr;
    const btnPlus = document.getElementById('btn-day-plus');
    btnPlus.disabled = dateStr >= todayRealStr;
    btnPlus.classList.toggle('opacity-30', dateStr >= todayRealStr);
    document.getElementById('btn-today').classList.toggle('hidden', isToday);
    document.getElementById('date-warning').classList.toggle('hidden', isToday);
}

function adjustDate(delta) {
    const next = addDays(currentDateStr, delta);
    if (next <= todayRealStr) changeDate(next);
}

function changeDate(newDate) {
    if (newDate > todayRealStr) return; // 미래 날짜 차단
    const oldM = currentMonthStr;
    setDateVariables(newDate);
    if (oldM !== currentMonthStr && user && db) subscribeToAttendance();
    else renderStudents();
}

        card.className = 'bg-white border border-slate-100 rounded-2xl p-4 shadow-sm flex flex-row items-center justify-between gap-2 hover:shadow-md transition-all border-b-4 border-b-slate-100 active:border-b-indigo-200';

        // 이름 영역
        const topDiv = document.createElement('div');
        topDiv.className = 'flex flex-col items-start min-w-[3.5rem]';

        const noSpan = document.createElement('span');
        noSpan.className = 'text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-0.5 rounded-full border border-slate-100';
        noSpan.textContent = `${s.no}번`;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'text-lg sm:text-xl font-black text-slate-800 mt-1 tracking-tight whitespace-nowrap';
        nameDiv.textContent = s.name;

        topDiv.appendChild(noSpan);
        topDiv.appendChild(nameDiv);

        // 차시 버튼 영역
        const btnContainer = document.createElement('div');
        btnContainer.className = 'flex gap-1.5 sm:gap-2';

        for (let p = 1; p <= CONFIG.maxPeriods; p++) {
            const st = sData[`p${p}`];

            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-center';

            const label = document.createElement('span');
            label.className = 'text-[9px] font-bold text-slate-400 mb-1';
            label.textContent = `${p}차`;

            const btn = document.createElement('button');
            // [버그수정] 기존 코드에서 클래스 문자열 직접 조합 → applyBtnStatus 함수로 통일
            btn.className = 'w-9 h-9 sm:w-10 sm:h-10 rounded-xl border-2 font-bold text-sm sm:text-base flex items-center justify-center transition-all';
            btn.setAttribute('data-action', 'toggle-status');
            btn.setAttribute('data-id', s.id);
            btn.setAttribute('data-p', p);
            applyBtnStatus(btn, st);

            wrapper.appendChild(label);
            wrapper.appendChild(btn);
            btnContainer.appendChild(wrapper);

        card.appendChild(topDiv);
        card.appendChild(btnContainer);
        grid.appendChild(card);
    });

    updateSummary(students, data);
}

// ── 출결 토글 ────────────────────────────────────────────────────────────────
async function handleToggleStatus(id, p) {
    const docId = makeDocId();
    if (!attendanceData[docId]) attendanceData[docId] = {};
    const curData = attendanceData[docId];
    if (!curData[id]) curData[id] = { p1:0, p2:0, p3:0, p4:0 };

    const next = (curData[id][`p${p}`] + 1) % 3;
    const periodsToUpdate = [p];
    if (next === 2 || next === 0) {
        for (let i = p + 1; i <= CONFIG.maxPeriods; i++) periodsToUpdate.push(i);
    }

    periodsToUpdate.forEach(period => {
        curData[id][`p${period}`] = next;
        const btn = document.querySelector(`button[data-action="toggle-status"][data-id="${id}"][data-p="${period}"]`);
        if (btn) applyBtnStatus(btn, next);
    });

    attendanceData[docId] = curData;
    updateSummary(allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass), curData);
    await saveDoc(docId, curData);
}

// ── 전원 출석/결석 ────────────────────────────────────────────────────────────
/**
 * [버그수정 핵심] 원본의 markAll 문제점 3가지를 모두 수정:
 *
 * 1. status === 1(출석) 일 때 periodsToUpdate 배열에 [period] 만 넣고
 *    이후 차시 연동을 하지 않는다 — 의도한 동작이지만, status === 0으로 되돌릴 방법이
 *    없어서 이미 결석 처리된 이후 차시가 출석으로 바뀌지 않는 문제가 있었음.
 *    → 출석 처리 시에는 선택 차시만, 결석 처리 시에는 이후 차시도 연동 (기존 의도 유지).
 *
 * 2. DOM querySelector로 버튼을 찾을 때 data-p 속성이 숫자지만 문자열로 비교되어
 *    일치하지 않는 케이스 발생 → data-p="${p}" 로 통일하여 해결.
 *
 * 3. applyBtnStatus 미사용으로 클래스 문자열을 markAll 내부에서 직접 조합할 때
 *    Tailwind 클래스가 purge되거나 순서가 달라져 스타일이 적용 안 되는 케이스 →
 *    applyBtnStatus 함수로 통일.
 */
async function markAll(status) {
    const selectEl = document.getElementById('quick-period-select');
    if (!selectEl || !selectedGrade || !selectedClass) return;
    const period     = parseInt(selectEl.value);
    const statusText = status === 1 ? '출석' : '결석';

    if (!confirm(`현재 반의 ${period}차시를 전원 [${statusText}] 처리하시겠습니까?`)) return;

    const docId = makeDocId();
    if (!attendanceData[docId]) attendanceData[docId] = {};
    const curData = attendanceData[docId];

    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);

    students.forEach(s => {
        if (!curData[s.id]) curData[s.id] = { p1:0, p2:0, p3:0, p4:0 };

        // 결석 처리 시 → 선택 차시 + 이후 차시 모두 결석 연동
        // 출석 처리 시 → 선택 차시만 출석 (이후 차시는 건드리지 않음)
        const periodsToUpdate = [period];
        if (status === 2) {
            for (let i = period + 1; i <= CONFIG.maxPeriods; i++) periodsToUpdate.push(i);
        }

        periodsToUpdate.forEach(p => {
            curData[s.id][`p${p}`] = status;
            // [버그수정] data-p 속성은 문자열 → 숫자 변환 없이 템플릿 리터럴로 매칭
            const btn = document.querySelector(
                `button[data-action="toggle-status"][data-id="${s.id}"][data-p="${p}"]`
            );
            if (btn) applyBtnStatus(btn, status);
        });
    });

    attendanceData[docId] = curData;
    updateSummary(students, curData);
    await saveDoc(docId, curData);
    showToast(`${period}차시 전원 ${statusText} 처리됨`);
}

// ── 모두 지우기 ───────────────────────────────────────────────────────────────
async function clearAllAttendance() {
    if (!confirm("해당 학급의 오늘 기록을 전부 지우시겠습니까?")) return;
    const docId    = makeDocId();
    const empty    = {};
    const students = allStudents.filter(s => s.grade === selectedGrade && s.class === selectedClass);

    students.forEach(s => {
        empty[s.id] = { p1:0, p2:0, p3:0, p4:0 };
        for (let p = 1; p <= CONFIG.maxPeriods; p++) {
            const btn = document.querySelector(
                `button[data-action="toggle-status"][data-id="${s.id}"][data-p="${p}"]`
            );
            if (btn) applyBtnStatus(btn, 0);
        }
    });

    attendanceData[docId] = empty;
    updateSummary(students, empty);
    await saveDoc(docId, empty);
    showToast("초기화 완료");
}

// ── 사이드 요약 ───────────────────────────────────────────────────────────────
function updateSummary(students, data) {
    const container = document.getElementById('class-stats-container');
    if (!container) return;
    container.innerHTML = '';
    for (let p = 1; p <= CONFIG.maxPeriods; p++) {
        const count = students.filter(s => (data[s.id] || {})[`p${p}`] === 1).length;
        const per   = students.length > 0 ? Math.round((count / students.length) * 100) : 0;
        const row   = document.createElement('div');
        row.className = 'text-xs md:text-sm text-indigo-800 flex justify-between items-center bg-white/60 px-4 py-2.5 rounded-xl border border-indigo-100 shadow-sm';
        row.innerHTML = `<span class='font-bold'>${p}차시</span>
            <span class='font-black'>${count}명 <span class="text-[10px] text-indigo-500 font-bold ml-1">${per}%</span></span>`;
        container.appendChild(row);
    }
}

// ── 관리자 통계 ───────────────────────────────────────────────────────────────
function updateAdminStats() {
    const body = document.getElementById('admin-table-body');
    if (!body) return;
    body.innerHTML = '';
    let totalP = 0, totalT = 0;

    for (let g = 1; g <= CONFIG.maxGrade; g++) {
        for (let c = 1; c <= CONFIG.classes[g]; c++) {
            const students = allStudents.filter(s => s.grade === g && s.class === c);
            if (students.length === 0) continue;

            const data    = attendanceData[`${currentDateStr}_${g}_${c}`] || {};
            const pCounts = [0,0,0,0];
            students.forEach(s => {
                for (let i = 0; i < CONFIG.maxPeriods; i++)
                    if (data[s.id]?.[`p${i+1}`] === 1) pCounts[i]++;
            });
            const pSum       = pCounts.reduce((a,b) => a+b, 0);
            const classTotal = students.length * CONFIG.maxPeriods;
            const per        = classTotal > 0 ? (pSum / classTotal * 100).toFixed(1) : '0.0';

            const row = document.createElement('tr');
            row.className = 'hover:bg-slate-50 cursor-pointer transition-colors';
            // [버그수정] 관리자 뷰 행 클릭 시 selectedGrade/Class를 먼저 세팅한 뒤
            //           renderClassButtons → updateUI → switchView 순으로 호출해
            //           반 버튼 하이라이트가 제대로 표시되도록 수정
            row.addEventListener('click', () => {
                selectedGrade = g; selectedClass = c;
                renderClassButtons(); updateUI(); switchView('teacher');
            });
            row.innerHTML = `
                <td class='px-5 py-4 font-bold text-slate-800'>${g}-${c}</td>
                <td class='px-5 py-4 text-slate-600'>${teachersData[`${g}_${c}`] || '-'}</td>
                <td class='px-5 py-4 text-slate-500'>${students.length}</td>
                <td class='px-5 py-4 text-center font-bold'>${pCounts[0]}</td>
                <td class='px-5 py-4 text-center font-bold'>${pCounts[1]}</td>
                <td class='px-5 py-4 text-center font-bold'>${pCounts[2]}</td>
                <td class='px-5 py-4 text-center font-bold'>${pCounts[3]}</td>
                <td class='px-5 py-4 text-right font-black text-indigo-600'>${per}%</td>`;
            body.appendChild(row);
            totalP += pSum; totalT += classTotal;
        }
    }
    document.getElementById('admin-total-percent').textContent =
        totalT > 0 ? (totalP / totalT * 100).toFixed(1) + '%' : '0.0%';
}

// ── Firestore ────────────────────────────────────────────────────────────────
async function saveDoc(docId, dataToSave) {
    if (db && user) {
        try {
            await setDoc(
                doc(db, 'artifacts', CONFIG.appId, 'public', 'data', `attendance_${currentMonthStr}`, docId),
                { data: dataToSave },
                { merge: true }
            );
        } catch (e) {
            console.error(e);
            showToast("저장 오류", "error");
        }
    }
}

function subscribeToAttendance() {
    if (!db || !user) return;
    if (unsubAttendance) unsubAttendance();
    const colRef = collection(db, 'artifacts', CONFIG.appId, 'public', 'data', `attendance_${currentMonthStr}`);
    unsubAttendance = onSnapshot(colRef, snapshot => {
        attendanceData = {};
        snapshot.forEach(d => { attendanceData[d.id] = d.data().data || {}; });
        if (currentView === 'teacher') renderStudents(); else updateAdminStats();
    }, err => {
        if (err.code !== 'permission-denied') console.error('Firestore 오류:', err);
    });
}

// ── CSV 파싱 ─────────────────────────────────────────────────────────────────
function parseStudentCSV(t) {
    return t.trim().split('\n').slice(1).map(l => {
        const p = l.split(',');
        if (p.length < 2) return null;
        const hs = p[0].trim();
        if (hs.length !== CONFIG.studentIdLength) return null;
        return { id: hs, grade: parseInt(hs[0]), class: parseInt(hs.substring(1,3)), no: parseInt(hs.substring(3,5)), name: p[1].trim() };
    }).filter(Boolean);
}

function parseTeacherCSV(t) {
    const obj = {};
    t.trim().split('\n').slice(1).forEach(l => {
        const p = l.split(',');
        if (p.length < 3) return;
        const gM = p[0].match(/\d+/), cM = p[1].match(/\d+/);
        if (gM && cM) obj[`${parseInt(gM[0])}_${parseInt(cM[0])}`] = p[2].trim();
    });
    return obj;
}

// ── 엑셀 다운로드 ─────────────────────────────────────────────────────────────
function exportToExcel() {
    const formattedDate = currentDateStr.replace(/-/g, '.');
    const maxClass  = Math.max(...Object.values(CONFIG.classes));
    const totalCols = 1 + CONFIG.maxGrade * (2 + CONFIG.maxPeriods);

    let headerGrade = '<tr><td></td>';
    for (let g = 1; g <= CONFIG.maxGrade; g++)
        headerGrade += `<td colspan="${2+CONFIG.maxPeriods}" style="border:0.5pt solid black;text-align:center;font-weight:bold;">${g}학년</td>`;
    headerGrade += '</tr>';

    let headerLabel = '<tr><td style="border:0.5pt solid black;text-align:center;">반</td>';
    for (let g = 1; g <= CONFIG.maxGrade; g++) {
        headerLabel += '<td style="border:0.5pt solid black;text-align:center;">반</td>';
        headerLabel += '<td style="border:0.5pt solid black;text-align:center;">재적</td>';
        for (let p = 1; p <= CONFIG.maxPeriods; p++)
            headerLabel += `<td style="border:0.5pt solid black;text-align:center;">${p}차</td>`;
    }
    headerLabel += '</tr>';

    let rowsHtml = '';
    for (let c = 1; c <= maxClass; c++) {
        rowsHtml += `<tr><td style="border:0.5pt solid black;text-align:center;">${c}반</td>`;
        for (let g = 1; g <= CONFIG.maxGrade; g++) {
            if (c <= CONFIG.classes[g]) {
                const students = allStudents.filter(s => s.grade === g && s.class === c);
                const data     = attendanceData[`${currentDateStr}_${g}_${c}`] || {};
                const pCounts  = Array.from({ length: CONFIG.maxPeriods }, (_, i) =>
                    students.filter(s => data[s.id]?.[`p${i+1}`] === 1).length
                );
                rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${c}</td>`;
                rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${students.length}</td>`;
                pCounts.forEach(n => {
                    rowsHtml += `<td style="border:0.5pt solid black;text-align:center;">${n}</td>`;
                });
            } else {
                rowsHtml += `<td colspan="${2+CONFIG.maxPeriods}" style="border:0.5pt solid black;"></td>`;
            }
        }
        rowsHtml += '</tr>';
    }

    const html = `<html><head><meta charset='utf-8'>
<style>table{border-collapse:collapse;font-family:'Malgun Gothic';}td{height:30px;}</style>
</head><body><table>
<tr><td colspan="${totalCols}" style="text-align:center;font-size:16pt;font-weight:bold;height:60px;">야간 자율학습 참여현황 (${formattedDate})</td></tr>
${headerGrade}${headerLabel}${rowsHtml}
</table></body></html>`;

    const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `참여현황_${currentDateStr}.xls`;
    a.click();
    URL.revokeObjectURL(a.href);
}

// ── 토스트 ───────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'success') {
    const t     = document.getElementById('toast');
    const color = type === 'success' ? 'text-emerald-400' : 'text-rose-400';
    const icon  = type === 'success' ? 'check-circle'     : 'alert-circle';
    t.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 ${color}"></i><span class="font-bold">${msg}</span>`;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    t.classList.remove('translate-y-32');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add('translate-y-32'), 2200);
}
